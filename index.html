    <script>
        const cv = document.getElementById('cv'),
            c = cv.getContext('2d');
        const mC = document.getElementById('mmC'),
            mc = mC.getContext('2d');

        function rz() {
            cv.width = innerWidth;
            cv.height = innerHeight
        }
        addEventListener('resize', rz);
        rz();

        // ════════════════════════════════════════════
        // ADDON 1: PIXEL PORTRAITS
        // ════════════════════════════════════════════
        const PORTRAIT_DATA = {
            petra: {
                skin: '#f0d0a0',
                hair: '#3a2a1a',
                hairType: 'long_l',
                eyes: '#1a1a2a',
                outfit: '#e0d8c8',
                acc: '#8b7355',
                mouth: '#c08878'
            },
            ranger: {
                skin: '#d4b088',
                hair: '#5a7a3a',
                hairType: 'hat',
                eyes: '#1a2a1a',
                outfit: '#558b2f',
                acc: '#c49a3c',
                mouth: '#b08070'
            },
            chen: {
                skin: '#d4a574',
                hair: '#2a1a10',
                hairType: 'long_b',
                eyes: '#1a1510',
                outfit: '#8b6a4a',
                acc: '#e0d8c8',
                mouth: '#b08070'
            },
            henrik: {
                skin: '#c0a080',
                hair: '#9a9a9a',
                hairType: 'short',
                eyes: '#2a2a2a',
                outfit: '#6a6a6a',
                acc: '#555555',
                mouth: '#907060',
                wrinkles: true
            },
            silva: {
                skin: '#c8a888',
                hair: '#2a1a2a',
                hairType: 'short',
                eyes: '#1a1520',
                outfit: '#e0d8e8',
                acc: '#7b1fa2',
                mouth: '#a08878',
                glasses: true
            },
            maria: {
                skin: '#d4a888',
                hair: '#8b2020',
                hairType: 'scarf',
                eyes: '#1a1010',
                outfit: '#c0392b',
                acc: '#e0c8b0',
                mouth: '#b07868'
            },
            paolo: {
                skin: '#c0a080',
                hair: '#4a4a4a',
                hairType: 'bald',
                eyes: '#1a1a1a',
                outfit: '#2a2a2a',
                acc: '#c49a3c',
                mouth: '#a08070'
            },
            tomas: {
                skin: '#e8c0a0',
                hair: '#b08040',
                hairType: 'messy',
                eyes: '#1a1a10',
                outfit: '#e8a040',
                acc: '#c08830',
                mouth: '#c08878',
                kid: true
            },
            elena: {
                skin: '#c0a080',
                hair: '#b0b0b0',
                hairType: 'long_b',
                eyes: '#2a2a1a',
                outfit: '#4a6a41',
                acc: '#6a8a5a',
                mouth: '#a08070',
                wrinkles: true
            },
            joao: {
                skin: '#c0a078',
                hair: '#3a2a1a',
                hairType: 'beard',
                eyes: '#1a1a10',
                outfit: '#3070a0',
                acc: '#205880',
                mouth: '#907868'
            },
            ana: {
                skin: '#d8b898',
                hair: '#4a3020',
                hairType: 'long_b',
                eyes: '#1a1520',
                outfit: '#7986cb',
                acc: '#5a6aab',
                mouth: '#b08078'
            },
            pedro: {
                skin: '#c0a078',
                hair: '#3a3a2a',
                hairType: 'hardhat',
                eyes: '#1a1a10',
                outfit: '#a08040',
                acc: '#808040',
                mouth: '#a08070'
            }
        };
        const SPEAKER_TO_PORTRAIT = {
            'Dr. Petra': 'petra',
            'Ranger Tom': 'ranger',
            'Chen Mei': 'chen',
            'Old Henrik': 'henrik',
            'Dr. Silva': 'silva',
            'Maria Santos': 'maria',
            'Father Paolo': 'paolo',
            'Tomás': 'tomas',
            'Elena Varga': 'elena',
            'João Ferreira': 'joao',
            'Ana Costa': 'ana',
            'Pedro Oliveira': 'pedro',
            '[THE PAST]': 'petra',
            '[PRESENT]': 'petra'
        };
        const _portCanvas = document.createElement('canvas');
        _portCanvas.width = 48;
        _portCanvas.height = 48;
        const _portCtx = _portCanvas.getContext('2d');
        _portCtx.imageSmoothingEnabled = false;

        function drawPortraitToCanvas(charId, emotion) {
            const px = _portCtx,
                p = PORTRAIT_DATA[charId] || PORTRAIT_DATA.petra;
            px.clearRect(0, 0, 48, 48);
            px.imageSmoothingEnabled = false;
            px.fillStyle = '#16141e';
            px.fillRect(0, 0, 48, 48);
            const yOff = p.kid ? 3 : 0;
            px.fillStyle = p.hair;
            switch (p.hairType) {
                case 'long_l':
                    px.fillRect(10, 4 + yOff, 20, 7);
                    px.fillRect(8, 4 + yOff, 5, 12);
                    break;
                case 'long_b':
                    px.fillRect(8, 3 + yOff, 24, 7);
                    px.fillRect(6, 3 + yOff, 5, 14);
                    px.fillRect(29, 3 + yOff, 5, 14);
                    break;
                case 'short':
                    px.fillRect(12, 4 + yOff, 18, 6);
                    break;
                case 'hat':
                    px.fillRect(6, 3 + yOff, 28, 5);
                    px.fillRect(4, 6 + yOff, 32, 4);
                    break;
                case 'hardhat':
                    px.fillStyle = '#ff8f00';
                    px.fillRect(6, 2 + yOff, 28, 4);
                    px.fillRect(4, 4 + yOff, 32, 4);
                    px.fillStyle = p.hair;
                    break;
                case 'scarf':
                    px.fillRect(6, 2 + yOff, 28, 6);
                    px.fillRect(4, 6 + yOff, 32, 3);
                    break;
                case 'messy':
                    px.fillRect(10, 3 + yOff, 20, 5);
                    px.fillRect(8, 5 + yOff, 4, 3);
                    px.fillRect(28, 4 + yOff, 4, 4);
                    break;
                case 'bald':
                    px.fillRect(14, 5 + yOff, 14, 4);
                    break;
                case 'beard':
                    px.fillRect(10, 4 + yOff, 20, 6);
                    break;
            }
            px.fillStyle = p.skin;
            const faceY = 9 + yOff,
                faceH = p.kid ? 12 : 14;
            px.fillRect(12, faceY, 18, faceH);
            const eyeY = faceY + 5;
            px.fillStyle = p.eyes;
            px.fillRect(16, eyeY, 3, 3);
            px.fillRect(25, eyeY, 3, 3);
            px.fillStyle = '#ffffff';
            px.fillRect(16, eyeY, 1, 1);
            px.fillRect(25, eyeY, 1, 1);
            if (p.glasses) {
                px.fillStyle = '#5a5a8a';
                px.fillRect(14, eyeY - 1, 7, 1);
                px.fillRect(23, eyeY - 1, 7, 1);
                px.fillRect(14, eyeY - 1, 1, 5);
                px.fillRect(20, eyeY - 1, 1, 5);
                px.fillRect(23, eyeY - 1, 1, 5);
                px.fillRect(29, eyeY - 1, 1, 5);
                px.fillRect(14, eyeY + 3, 7, 1);
                px.fillRect(23, eyeY + 3, 7, 1);
                px.fillRect(21, eyeY, 2, 1);
            }
            if (p.wrinkles) {
                px.fillStyle = 'rgba(0,0,0,0.12)';
                px.fillRect(14, eyeY + 5, 5, 1);
                px.fillRect(25, eyeY + 5, 5, 1);
            }
            px.fillStyle = p.mouth;
            const mY = faceY + faceH - 4;
            if (emotion === 'worried') {
                px.fillRect(18, mY, 7, 1);
                px.fillRect(17, mY - 1, 2, 1);
            } else if (emotion === 'happy') {
                px.fillRect(18, mY - 1, 7, 1);
                px.fillRect(17, mY, 2, 1);
                px.fillRect(24, mY, 2, 1);
            } else if (emotion === 'sad') {
                px.fillRect(18, mY, 7, 1);
                px.fillRect(17, mY + 1, 2, 1);
                px.fillRect(24, mY + 1, 2, 1);
            } else if (emotion === 'angry') {
                px.fillRect(18, mY, 7, 1);
                px.fillStyle = p.eyes;
                px.fillRect(15, eyeY - 2, 4, 1);
                px.fillRect(25, eyeY - 2, 4, 1);
            } else {
                px.fillRect(18, mY, 7, 1);
            }
            if (p.hairType === 'beard') {
                px.fillStyle = p.hair;
                px.fillRect(12, mY + 1, 18, 4);
            }
            px.fillStyle = p.outfit;
            const outY = faceY + faceH + 1;
            px.fillRect(8, outY, 26, 48 - outY);
            px.fillStyle = p.acc;
            if (charId === 'paolo') {
                px.fillRect(19, outY + 2, 4, 6);
                px.fillRect(17, outY + 4, 8, 2);
            } else if (charId === 'ranger') {
                px.fillRect(13, outY + 2, 3, 3);
            } else {
                px.fillRect(14, outY, 14, 2);
            }
            return _portCanvas;
        }

        // Track who the NPC is in the current conversation
        let _dlgNpcId = null;

        function detectDlgNpc(lines) {
            for (let l of lines) {
                let s = l.s || '';
                if (!s || s === 'Dr. Petra' || s === '[THE PAST]' || s === '[PRESENT]') continue;
                for (let [name, id] of Object.entries(SPEAKER_TO_PORTRAIT)) {
                    if (s.includes(name.split(' ')[0])) return id;
                }
            }
            return null; // self-talk only
        }

        const _portStyle = `width:72px;min-height:80px;background:#0d0b16;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;padding:5px 4px;transition:opacity .18s;`;
        const _portNameStyle = `font-family:'Press Start 2P',cursive;font-size:3.5px;color:#9c90b8;text-align:center;margin-top:3px;text-transform:uppercase;max-width:64px;line-height:1.4;word-break:break-all;`;

        function initPortraitUI() {
            const dlg = document.getElementById('dlg');
            if (!dlg) return;
            if (document.getElementById('_portLeft')) return;
            // Widen dialog for two portraits
            dlg.style.maxWidth = '820px';
            dlg.style.width = '92%';
            dlg.style.padding = '0';
            const existingContent = dlg.innerHTML;
            dlg.innerHTML = `
    <div id="_portRow" style="display:flex;align-items:stretch;">
      <div id="_portLeft" style="${_portStyle}border-right:2px solid #2a2040;">
        <canvas id="_portDispL" width="48" height="48" style="width:48px;height:48px;image-rendering:pixelated;border:2px solid #3d3652;border-radius:2px;"></canvas>
        <div id="_portNameL" style="${_portNameStyle}">DR. PETRA</div>
      </div>
      <div id="_portContent" style="flex:1;padding:10px 13px;position:relative;min-height:80px;">
        ${existingContent}
      </div>
      <div id="_portRight" style="${_portStyle}border-left:2px solid #2a2040;">
        <canvas id="_portDispR" width="48" height="48" style="width:48px;height:48px;image-rendering:pixelated;border:2px solid #3d3652;border-radius:2px;"></canvas>
        <div id="_portNameR" style="${_portNameStyle}"></div>
      </div>
    </div>`;
            // Pre-draw Petra on left
            const lc = document.getElementById('_portDispL');
            if (lc) {
                const d = lc.getContext('2d');
                d.imageSmoothingEnabled = false;
                d.drawImage(drawPortraitToCanvas('petra', 'neutral'), 0, 0);
            }
        }

        function _drawToCanvas(canvasId, charId, emotion) {
            const el = document.getElementById(canvasId);
            if (!el) return;
            const d = el.getContext('2d');
            d.imageSmoothingEnabled = false;
            d.clearRect(0, 0, 48, 48);
            d.drawImage(drawPortraitToCanvas(charId, emotion || 'neutral'), 0, 0);
        }

        function updatePortrait(speakerName, emotion) {
            const isSelfTalk = !_dlgNpcId; // no NPC in this conversation
            const isPetraSpeaking = !speakerName || speakerName === 'Dr. Petra' || speakerName === '[THE PAST]' || speakerName === '[PRESENT]';

            // — LEFT: always Dr. Petra —
            const lWrap = document.getElementById('_portLeft');
            if (lWrap) {
                // Bright when NPC speaks (Petra is listening), dimmed when Petra speaks or self-talk
                lWrap.style.opacity = (!isSelfTalk && !isPetraSpeaking) ? '1' : '0.38';
                _drawToCanvas('_portDispL', 'petra', !isPetraSpeaking ? 'neutral' : emotion);
                const ln = document.getElementById('_portNameL');
                if (ln) ln.textContent = 'DR. PETRA';
            }

            // — RIGHT: active speaker —
            const rWrap = document.getElementById('_portRight');
            if (rWrap) {
                rWrap.style.opacity = '1';
                let rCharId, rLabel;
                if (isPetraSpeaking) {
                    // Petra is speaking → show Petra on right with her emotion
                    rCharId = 'petra';
                    rLabel = 'DR. PETRA';
                    _drawToCanvas('_portDispR', 'petra', emotion);
                } else {
                    // NPC is speaking → show NPC on right
                    rCharId = _dlgNpcId || 'petra';
                    // Get readable short name
                    rLabel = (speakerName || '').toUpperCase().replace('DR. ', 'DR.').split(' ').slice(0, 2).join('\n');
                    _drawToCanvas('_portDispR', rCharId, emotion);
                }
                const rn = document.getElementById('_portNameR');
                if (rn) rn.textContent = rLabel;
            }
        }

        // ════════════════════════════════════════════
        // ADDON 2: ENTERABLE CABIN WITH INTERACTABLE FURNITURE
        // ════════════════════════════════════════════
        let CABIN_ACTIVE = false;
        let _savedOutdoorX = 0,
            _savedOutdoorY = 0;
        const CABIN_W = 14,
            CABIN_H = 11;
        const CABIN_TILE = {
            FLOOR: 0,
            WALL: 1,
            BED: 2,
            STOVE: 3,
            TABLE: 4,
            CHAIR: 5,
            SHELF: 6,
            DOOR_EXIT: 7,
            RUG: 8,
            CHEST: 9,
            SINK: 10,
            WINDOW: 11,
            COUNTER: 12,
            FIREPLACE: 13
        };
        const CABIN_SOLID = new Set([CABIN_TILE.WALL, CABIN_TILE.BED, CABIN_TILE.STOVE, CABIN_TILE.TABLE, CABIN_TILE.SHELF, CABIN_TILE.CHEST, CABIN_TILE.SINK, CABIN_TILE.COUNTER, CABIN_TILE.FIREPLACE, CABIN_TILE.WINDOW]);
        let cabinMap = [];

        function generateCabinInterior() {
            cabinMap = [];
            for (let y = 0; y < CABIN_H; y++) {
                cabinMap[y] = [];
                for (let x = 0; x < CABIN_W; x++) {
                    cabinMap[y][x] = (y === 0 || y === CABIN_H - 1 || x === 0 || x === CABIN_W - 1) ? CABIN_TILE.WALL : CABIN_TILE.FLOOR;
                }
            }
            cabinMap[CABIN_H - 1][6] = CABIN_TILE.DOOR_EXIT;
            cabinMap[CABIN_H - 1][7] = CABIN_TILE.DOOR_EXIT;
            cabinMap[0][4] = CABIN_TILE.WINDOW;
            cabinMap[0][5] = CABIN_TILE.WINDOW;
            cabinMap[0][9] = CABIN_TILE.WINDOW;
            cabinMap[0][10] = CABIN_TILE.WINDOW;
            cabinMap[1][1] = CABIN_TILE.BED;
            cabinMap[1][2] = CABIN_TILE.BED;
            cabinMap[2][1] = CABIN_TILE.BED;
            cabinMap[2][2] = CABIN_TILE.BED;
            cabinMap[1][6] = CABIN_TILE.FIREPLACE;
            cabinMap[1][7] = CABIN_TILE.FIREPLACE;
            cabinMap[1][10] = CABIN_TILE.COUNTER;
            cabinMap[1][11] = CABIN_TILE.STOVE;
            cabinMap[1][12] = CABIN_TILE.STOVE;
            cabinMap[2][10] = CABIN_TILE.COUNTER;
            cabinMap[2][11] = CABIN_TILE.SINK;
            cabinMap[2][12] = CABIN_TILE.COUNTER;

            cabinMap[5][1] = CABIN_TILE.SHELF;

        function drawCabinTile(ctx, tileType, screenX, screenY, TS) {
            const x = screenX,
                y = screenY,
                s = TS,
                h = Math.floor(s / 2),
                q = Math.floor(s / 4);
            switch (tileType) {
                case CABIN_TILE.FLOOR: {
                    // Wood planks with alternating grain
                    const col = ((Math.floor(screenX / s) + Math.floor(screenY / s)) % 2 === 0) ? '#8a7352' : '#7e6848';
                    ctx.fillStyle = col;
                    ctx.fillRect(x, y, s, s);
                    // Plank line every other tile column
                    ctx.fillStyle = 'rgba(0,0,0,0.22)';
                    ctx.fillRect(x, y + s - 1, s, 1); // bottom edge
                    if (Math.floor(screenX / s) % 2 === 0) ctx.fillRect(x + h, y, 1, s);
                    // Knot
                    if (Math.floor(screenX / s) % 3 === 1 && Math.floor(screenY / s) % 2 === 0) {
                        ctx.fillStyle = 'rgba(0,0,0,0.12)';
                        ctx.beginPath();
                        ctx.ellipse(x + q * 3, y + h, 3, 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
                }
                case CABIN_TILE.WALL: {
                    // Log cabin: alternating dark/light log courses
                    const logH = Math.ceil(s / 3);
                    for (let i = 0; i < 3; i++) {
                        ctx.fillStyle = i % 2 === 0 ? '#5a4535' : '#4e3a2c';
                        ctx.fillRect(x, y + i * logH, s, logH);
                        // Log highlight top edge
                        ctx.fillStyle = 'rgba(255,200,120,0.07)';
                        ctx.fillRect(x, y + i * logH, s, 2);
                        // Log shadow bottom edge
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(x, y + i * logH + logH - 2, s, 2);
                    }
                    // Chinking (mortar lines)
                    ctx.fillStyle = '#3a2a1e';
                    ctx.fillRect(x, y + logH - 1, s, 2);
                    ctx.fillRect(x, y + logH * 2 - 1, s, 2);
                    break;
                }
                case CABIN_TILE.BED: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Bed frame
                    ctx.fillStyle = '#4e2e18';
                    ctx.fillRect(x + 1, y + 1, s - 2, s - 2);
                    // Blanket — warm wool colour
                    ctx.fillStyle = '#4a6a8a';
                    ctx.fillRect(x + 2, y + 4, s - 4, s - 6);
                    // Blanket pattern stripe
                    ctx.fillStyle = '#5a8aaa';
                    ctx.fillRect(x + 2, y + 6, s - 4, 2);
                    ctx.fillRect(x + 2, y + 10, s - 4, 2);
                    // Pillow
                    ctx.fillStyle = '#e8e0cc';
                    ctx.fillRect(x + 3, y + 2, s - 6, q);
                    // Pillow shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(x + 3, y + 2 + q - 1, s - 6, 1);
                    break;
                }
                case CABIN_TILE.STOVE: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    ctx.fillStyle = '#2a2a2a';
                    ctx.fillRect(x + 2, y + 2, s - 4, s - 4);
                    // Stove top
                    ctx.fillStyle = '#383838';
                    ctx.fillRect(x + 3, y + 3, s - 6, s - 8);
                    // Burners
                    const bFlk = 0.5 + Math.sin(Date.now() / 300) * 0.3;
                    ctx.fillStyle = `rgba(220,60,20,${0.7+bFlk*0.3})`;
                    ctx.beginPath();
                    ctx.arc(x + q, y + q, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(240,140,30,${0.6+bFlk*0.4})`;
                    ctx.beginPath();
                    ctx.arc(x + s - q, y + q, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // Glow
                    ctx.fillStyle = `rgba(255,100,30,${0.08+bFlk*0.05})`;
                    ctx.fillRect(x, y, s, s);
                    break;
                }
                case CABIN_TILE.TABLE: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Table top with perspective edge
                    ctx.fillStyle = '#7a5a38';
                    ctx.fillRect(x, y + 3, s, s - 5);
                    ctx.fillStyle = '#6a4a28';
                    ctx.fillRect(x, y + 3, s, 3); // front edge
                    ctx.fillStyle = '#8a6a48';
                    ctx.fillRect(x + 1, y + 6, s - 2, s - 10); // surface
                    // Wood grain on surface
                    ctx.fillStyle = 'rgba(0,0,0,0.08)';
                    ctx.fillRect(x + h, y + 6, 1, s - 11);
                    break;
                }
                case CABIN_TILE.CHAIR: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    const bx = x + q,
                        bw = s - h;
                    // Back rest
                    ctx.fillStyle = '#5a3a22';
                    ctx.fillRect(bx, y + 1, bw, s - h);
                    ctx.fillStyle = '#6a4a32';
                    ctx.fillRect(bx + 1, y + 2, bw - 2, s - h - 2);
                    // Seat
                    ctx.fillStyle = '#7a5535';
                    ctx.fillRect(bx, y + h, bw, s - h - 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    ctx.fillRect(bx, y + h, bw, 2);
                    break;
                }
                case CABIN_TILE.SHELF: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Wall backing
                    ctx.fillStyle = '#4a3525';
                    ctx.fillRect(x, y, s, s);
                    // Shelf boards
                    ctx.fillStyle = '#7a5a38';
                    ctx.fillRect(x, y + 2, s, 4);
                    ctx.fillRect(x, y + s - 6, s, 4);
                    // Items: book, jar, vial
                    ctx.fillStyle = '#8b3030';
                    ctx.fillRect(x + 1, y + 6, 4, 8);
                    ctx.fillStyle = '#3a5a8a';
                    ctx.fillRect(x + 6, y + 7, 3, 7);
                    ctx.fillStyle = '#c49a3c';
                    ctx.fillRect(x + 10, y + 8, 4, 6);
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(x + 10, y + 8, 2, 2); // jar glint
                    // Bottom shelf items
                    ctx.fillStyle = '#5a7a3a';
                    ctx.fillRect(x + 2, y + s - 5, 5, 3);
                    ctx.fillStyle = '#a08040';
                    ctx.fillRect(x + 8, y + s - 5, 4, 3);
                    break;
                }
                case CABIN_TILE.DOOR_EXIT: {
                    // Door frame
                    ctx.fillStyle = '#3e2510';
                    ctx.fillRect(x, y, s, s);
                    ctx.fillStyle = '#2e1808';
                    ctx.fillRect(x + 2, y, s - 4, s);
                    // Planks
                    ctx.fillStyle = '#4a2e14';
                    ctx.fillRect(x + 3, y, h - 2, s);
                    ctx.fillStyle = '#422810';
                    ctx.fillRect(x + h + 1, y, h - 2, s);
                    // Divider
                    ctx.fillStyle = '#2a1808';
                    ctx.fillRect(x + h, y, 1, s);
                    // Handle
                    ctx.fillStyle = '#c49a3c';
                    ctx.beginPath();
                    ctx.arc(x + s - 6, y + h, 3, 0, Math.PI * 2);
                    ctx.fill();
                    // Warm light spill from outside
                    ctx.fillStyle = 'rgba(200,230,160,0.06)';
                    ctx.fillRect(x + 3, y + 1, s - 6, s - 2);
                    break;
                }
                case CABIN_TILE.RUG: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Rug body
                    ctx.fillStyle = '#7a2828';
                    ctx.fillRect(x + 1, y + 1, s - 2, s - 2);
                    ctx.fillStyle = '#8a3838';
                    ctx.fillRect(x + 3, y + 3, s - 6, s - 6);
                    // Medallion pattern
                    ctx.fillStyle = '#c49a3c';
                    ctx.fillRect(x + h - 1, y + 2, 2, s - 4); // vertical
                    ctx.fillRect(x + 2, y + h - 1, s - 4, 2); // horizontal
                    ctx.beginPath();
                    ctx.arc(x + h, y + h, 4, 0, Math.PI * 2);
                    ctx.fill(); // center
                    ctx.fillStyle = '#a07020';
                    ctx.beginPath();
                    ctx.arc(x + h, y + h, 2, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                }
                case CABIN_TILE.CHEST: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Chest body
                    ctx.fillStyle = '#5a3a20';
                    ctx.fillRect(x + 1, y + 4, s - 2, s - 6);
                    ctx.fillStyle = '#6a4a30';
                    ctx.fillRect(x + 2, y + 5, s - 4, s - 8);
                    // Lid
                    ctx.fillStyle = '#4a2e14';
                    ctx.fillRect(x + 1, y + 2, s - 2, 4);
                    ctx.fillStyle = 'rgba(255,200,100,0.06)';
                    ctx.fillRect(x + 2, y + 2, s - 4, 2);
                    // Metal banding
                    ctx.fillStyle = '#8a7040';
                    ctx.fillRect(x + 1, y + 4, s - 2, 2);
                    // Latch
                    ctx.fillStyle = '#d4a020';
                    ctx.fillRect(x + h - 2, y + 4, 4, 4);
                    ctx.fillStyle = '#ffe060';
                    ctx.fillRect(x + h - 1, y + 5, 2, 2);
                    break;
                }
                case CABIN_TILE.SINK: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    // Counter surface
                    ctx.fillStyle = '#b0b0b0';
                    ctx.fillRect(x + 1, y + 2, s - 2, s - 4);
                    // Basin
                    ctx.fillStyle = '#6080a0';
                    ctx.fillRect(x + 3, y + 4, s - 6, s - 8);
                    ctx.fillStyle = '#4068a0';
                    ctx.fillRect(x + 4, y + 5, s - 8, s - 10);
                    // Water surface glint
                    ctx.fillStyle = 'rgba(180,220,255,0.4)';
                    ctx.fillRect(x + 4, y + 5, s - 8, 2);
                    // Faucet
                    ctx.fillStyle = '#909090';
                    ctx.fillRect(x + h - 1, y + 1, 2, 4);
                    ctx.fillStyle = '#b0b0b0';
                    ctx.fillRect(x + h - 2, y + 2, 4, 2);
                    break;
                }
                case CABIN_TILE.WINDOW: {
                    ctx.fillStyle = '#4a3828';
                    ctx.fillRect(x, y, s, s);
                    const t2 = Math.floor(G.ck.t / 60),
                        isDay = t2 >= 6 && t2 < 20;
                    // Sky colour by time
                    const skyCol = isDay ? '#6aacda' : '#1a1a2a';
                    ctx.fillStyle = skyCol;
                    ctx.fillRect(x + 2, y + 2, s - 4, s - 4);
                    // Trees / landscape silhouette
                    ctx.fillStyle = isDay ? '#2d6b2e' : '#162016';
                    ctx.fillRect(x + 2, y + h, s - 4, s - h - 2);
                    // Sun or moon
                    if (isDay) {
                        ctx.fillStyle = 'rgba(255,240,150,0.7)';
                        ctx.beginPath();
                        ctx.arc(x + s - 6, y + 5, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = 'rgba(220,220,255,0.5)';
                        ctx.beginPath();
                        ctx.arc(x + s - 6, y + 5, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Window frame cross
                    ctx.fillStyle = '#4a3828';
                    ctx.fillRect(x + h - 1, y + 2, 2, s - 4);
                    ctx.fillRect(x + 2, y + h - 1, s - 4, 2);
                    // Glass glint
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(x + 3, y + 3, q, q);
                    break;
                }
                case CABIN_TILE.COUNTER: {
                    ctx.fillStyle = '#8a7352';
                    ctx.fillRect(x, y, s, s);
                    ctx.fillStyle = '#4a3020';
                    ctx.fillRect(x, y + 2, s, s - 3);
                    ctx.fillStyle = '#7a6040';
                    ctx.fillRect(x, y + 2, s, 4); // counter top
                    ctx.fillStyle = '#5a4030';
                    ctx.fillRect(x + 1, y + 6, s - 2, s - 8); // cabinet body
                    // Cabinet door line
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(x + h, y + 7, 1, s - 9);
                    break;
                }
                case CABIN_TILE.FIREPLACE: {
                    ctx.fillStyle = '#3a3a3a';
                    ctx.fillRect(x, y, s, s);
                    // Stone surround detail
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(x + 1, y + 1, s - 2, s - 2);
                    ctx.fillStyle = '#555';
                    ctx.fillRect(x + 2, y + 1, q, q);
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(x + s - q - 2, y + 1, q, q);
                    // Firebox
                    ctx.fillStyle = '#181818';
                    ctx.fillRect(x + 3, y + 4, s - 6, s - 5);
                    // Fire — multi-layer animated
                    const fl = 0.6 + Math.sin(Date.now() / 180) * 0.2 + Math.sin(Date.now() / 113) * 0.15;
                    const fl2 = 0.6 + Math.sin(Date.now() / 220 + 1) * 0.2;
                    ctx.fillStyle = `rgba(180,50,5,${fl*0.9})`;
                    ctx.fillRect(x + 4, y + s - 8, s - 8, 6);
                    ctx.fillStyle = `rgba(240,120,10,${fl*0.85})`;
                    ctx.fillRect(x + 5, y + s - 10, s - 10, 5);
                    ctx.fillStyle = `rgba(255,200,40,${fl2*0.8})`;
                    ctx.fillRect(x + 6, y + s - 12, s - 12, 4);
                    ctx.fillStyle = `rgba(255,240,180,${fl2*0.5})`;
                    ctx.fillRect(x + 7, y + s - 13, s - 14, 2);
                    // Ember glow at base
                    ctx.fillStyle = `rgba(255,80,0,${fl*0.3})`;
                    ctx.fillRect(x + 3, y + s - 3, s - 6, 2);
                    break;
                }
            }
        }

                    id: 'shelf',
                    label: '📚 Bookshelf'
                },
                {
                    cx: 1,
                    cy: 7,
                    w: 1,
                    h: 1,
                    id: 'chest',
                    label: '📦 Chest'
                },
                {
                    cx: 6.5,
                    cy: CABIN_H - 1,
                    w: 2,
                    h: 1,
                    id: 'door',
                    label: '🚪 Exit Cabin'
                }
            ];
            for (let f of furniture) {
                let fx = f.cx * tileSize,
                    fy = f.cy * tileSize,
                    dx = playerX - fx,

                if (Math.abs(dx) < f.w * tileSize / 2 + range && Math.abs(dy) < f.h * tileSize / 2 + range) return f;
            }
            return null;
        }

        // Big tiles that need an extra margin — trees visually overflow their tile
        const SOL_BIG = new Set([TT.TR, TT.DT]);

        function isSolid(wx, wy) {
            const tx = Math.floor(wx / T),
                ty = Math.floor(wy / T);
            if (SOL.has(map[ty]?.[tx])) return true;
            // Extra radius check for big trees: also block if within 4px of an adjacent tree tile
            for (let dy = -1; dy <= 1; dy++)
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    const nt = map[ty + dy]?.[tx + dx];
                    if (SOL_BIG.has(nt)) {
                        // nearest edge of that neighbour tile
                        const ex = Math.max((tx + dx) * T, Math.min(wx, (tx + dx + 1) * T));
                        const ey = Math.max((ty + dy) * T, Math.min(wy, (ty + dy + 1) * T));
                        if (Math.hypot(wx - ex, wy - ey) < 6) return true;
                    }
                }
            return false;
        }
        let map = [];

        function sr(a) {
            return function() {
                a |= 0;
                a = a + 0x6D2B79F5 | 0;
                let t = Math.imul(a ^ a >>> 15, 1 | a);
                t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
                return ((t ^ t >>> 14) >>> 0) / 4294967296
            }
        }
        let rng;

        function genWorld() {
            rng = sr(777);
            let r = rng;
            let n1 = [],
                n2 = [],
                n3 = [];
            for (let y = 0; y < MH; y++) {
                n1[y] = [];
                n2[y] = [];
                n3[y] = [];
                for (let x = 0; x < MW; x++) {
                    n1[y][x] = r();
                    n2[y][x] = r();
                    n3[y][x] = r()
                }
            }

            function sn(a, x, y, s) {
                let sx = Math.floor(x / s),
                    sy = Math.floor(y / s),
                    fx = (x % s) / s,
                    fy = (y % s) / s;
                let g = (ax, ay) => (a[((ay % MH) + MH) % MH] || [])[((ax % MW) + MW) % MW] || 0;
                return (g(sx, sy) + (g(sx + 1, sy) - g(sx, sy)) * fx) * (1 - fy) + (g(sx, sy + 1) + (g(sx + 1, sy + 1) - g(sx, sy + 1)) * fx) * fy
            }

            map = [];
            for (let y = 0; y < MH; y++) {
                map[y] = [];
                for (let x = 0; x < MW; x++) {
                    let v1 = sn(n1, x, y, 14),
                        v2 = sn(n2, x, y, 8),
                        v3 = sn(n3, x, y, 4);
                    let v = v1 * .5 + v2 * .3 + v3 * .2;
                    // Main river winding through the map
                    let rv = Math.abs((x - 100) + Math.sin(y * .04) * 30 + Math.sin(y * .02) * 15);
                    let rv2 = Math.abs((y - 100) + Math.sin(x * .035) * 25 + Math.cos(x * .02) * 10);
                    // Stream
                    let st = Math.abs((x - 50) + Math.sin(y * .06) * 10);
                    let t = TT.G;
                    if (rv < 2.5) t = TT.W;
                    else if (rv < 4) t = TT.S;
                    else if (rv < 5.5 && v > .4) t = TT.MU;
                    if (rv2 < 2 && x > 80 && x < 180 && y > 40) t = TT.W;
                    else if (rv2 < 3.5 && x > 80 && x < 180 && y > 40 && t === TT.G) t = TT.MU;
                    if (st < 1.5 && y > 100 && y < 180 && x < 70) t = TT.W;
                    else if (st < 3 && y > 100 && y < 180 && x < 70 && t === TT.G) t = TT.MU;
                    if (t === TT.G) {
                        if (v < .18) t = TT.DT;
                        else if (v < .28) t = TT.TR;
                        else if (v < .34) t = TT.BU;
                        else if (v < .5) t = TT.G;
                        else if (v < .56) t = TT.TG;
                        else if (v < .62) t = TT.G;
                        else if (v < .68) t = TT.D;
                        else if (v < .78) t = TT.G;
                        else if (v < .84) t = TT.R;
                        else if (v < .9) t = TT.BO;
                        else t = TT.CL
                    }
                    // Elevation: mountains along top and right edges
                    let edgeDist = Math.min(x, y, MW - x, MH - y);
                    if (edgeDist < 6) t = TT.DT;
                    if (y < 15 && v > .3) t = TT.CL;
                    if (x > MW - 15 && v > .35) t = TT.CL;
                    // Flower meadows scattered
                    if (t === TT.G && v3 > .85 && v1 > .5) t = TT.FL2;
                    map[y][x] = t
                }
            }

            // Carve many paths connecting areas
            function cp(x1, y1, x2, y2, w) {
                let x = x1,
                    y = y1,
                    s = 0;
                while ((Math.abs(x - x2) > .5 || Math.abs(y - y2) > .5) && s < 800) {
                    s++;
                    let ix = Math.round(x),
                        iy = Math.round(y);
                    for (let dy = -(w - 1); dy < w; dy++)
                        for (let dx = -(w - 1); dx < w; dx++) {
                            let tx = ix + dx,
                                ty = iy + dy;
                            if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) map[ty][tx] = TT.P
                        }
                    if (Math.abs(x - x2) > Math.abs(y - y2)) x += (x2 > x) ? 1 : -1;
                    else y += (y2 > y) ? 1 : -1;
                    if (r() < .3) {
                        x += (r() - .5) * .7;
                        y += (r() - .5) * .7
                    }
                }
            }

            // Main paths connecting all key locations
            // Park center at 100,100
            // Village at 30,170
            // Ranger station at 100,60
            // Cabin at 90,95
            // Landslide NW at 40,30
            // Fault ridge NE at 160,25

            // Old mine SE at 150,120
            // Mountain pass N at 100,15

            cp(25, 80, 35, 130, 2);

            cp(160, 25, 175, 90, 2);

            cp(150, 120, 160, 170, 2);
            cp(30, 170, 160, 170, 2);
            // Extra paths for exploration
            cp(100, 100, 60, 60, 2);
            cp(100, 100, 140, 60, 2);
            cp(60, 60, 40, 30, 2);
            cp(140, 60, 160, 25, 2);
            cp(100, 100, 90, 95, 2); // to cabin

            // Clear areas
            function clr(cx, cy, r2, t) {
                for (let dy = -r2; dy <= r2; dy++)
                    for (let dx = -r2; dx <= r2; dx++) {
                        let tx = cx + dx,
                            ty = cy + dy;
                        if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6 && Math.sqrt(dx * dx + dy * dy) <= r2) map[ty][tx] = t
                    }
            }

            clr(100, 100, 6, TT.D); // park center
            clr(100, 60, 4, TT.D); // ranger station
            clr(90, 95, 3, TT.D); // cabin area

            // === VILLAGE (30,170) - proper village with distinct zones ===
            // Clear a larger village footprint
            for (let dy = -15; dy <= 15; dy++)
                for (let dx = -18; dx <= 18; dx++) {

            // Church building footprint

                [38, 177, 4, 5, TT.H],

            vBlds.forEach(([bx, by, bw, bh, tt]) => {
                for (let dy = 0; dy < bh; dy++)
                    for (let dx = 0; dx < bw; dx++) {
                        let tx = bx + dx, ty = by + dy;

                    }
            });

            // Church (north end, stone building)
            for (let dy = 0; dy < 4; dy++)
                for (let dx = 0; dx < 4; dx++) map[159 + dy][29 + dx] = TT.CH;

            // Fences around farm plots
            for (let dx = -15; dx <= -6; dx++) {
                let tx = 30 + dx;
                if (tx >= 6 && tx < MW - 6) {
                    if (map[163][tx] === TT.TG || map[163][tx] === TT.D) map[163][tx] = TT.FE;
                    if (map[172][tx] === TT.TG || map[172][tx] === TT.D) map[172][tx] = TT.FE;

            // Fence sides
            for (let dy = 0; dy < 9; dy++) {

                if (ty >= 6 && ty < MH - 6) {
                    if (map[ty][14] === TT.TG || map[ty][14] === TT.D) map[ty][14] = TT.FE;
                    if (map[ty][23] === TT.TG || map[ty][23] === TT.D) map[ty][23] = TT.FE;
                }
            }

            // === SPECIAL ZONES ===
            // Landslide
            for (let dy = -5; dy <= 5; dy++)
                for (let dx = -6; dx <= 6; dx++) {
                    let tx = 40 + dx,
                        ty = 30 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6 && Math.sqrt(dx * dx + dy * dy) < 6) {
                        if (dy < -2) map[ty][tx] = TT.CL;
                        else if (r() < .35) map[ty][tx] = TT.LS;
                        else if (r() < .25) map[ty][tx] = TT.FL;
                        else map[ty][tx] = TT.MU
                    }
                }

            // Fault
            for (let dy = -3; dy <= 3; dy++)
                for (let dx = -8; dx <= 8; dx++) {
                    let tx = 160 + dx,
                        ty = 25 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        if (Math.abs(dy) <= 1 && Math.abs(dx) <= 7) map[ty][tx] = TT.FC;
                        else if (Math.abs(dy) <= 2) map[ty][tx] = TT.EX;
                        else map[ty][tx] = TT.D
                    }
                }

            // Cave
            for (let dy = -3; dy <= 3; dy++)
                for (let dx = -4; dx <= 4; dx++) {
                    let tx = 25 + dx,
                        ty = 80 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        if (dy <= -1) map[ty][tx] = TT.CL;
                        else if (dx === 0 && dy === 0) map[ty][tx] = TT.CV;
                        else map[ty][tx] = TT.MR
                    }
                }

            // River erosion
            for (let dy = -4; dy <= 4; dy++)
                for (let dx = -5; dx <= 5; dx++) {
                    let tx = 175 + dx,
                        ty = 90 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6 && Math.sqrt(dx * dx + dy * dy) < 5) {
                        if (r() < .3) map[ty][tx] = TT.ER;
                        else if (r() < .3) map[ty][tx] = TT.S;
                        else map[ty][tx] = TT.MU
                    }
                }

            // Quarry
            for (let dy = -5; dy <= 5; dy++)
                for (let dx = -5; dx <= 5; dx++) {
                    let tx = 160 + dx,
                        ty = 170 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        let d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 3.5) map[ty][tx] = TT.EX;
                        else if (d < 5) map[ty][tx] = TT.BO;
                        else map[ty][tx] = TT.D
                    }
                }

            // Wetland
            for (let dy = -6; dy <= 6; dy++)
                for (let dx = -6; dx <= 6; dx++) {
                    let tx = 35 + dx,
                        ty = 130 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6 && Math.sqrt(dx * dx + dy * dy) < 6) {
                        let rv2 = r();
                        if (rv2 < .25) map[ty][tx] = TT.W;
                        else if (rv2 < .45) map[ty][tx] = TT.MU;
                        else map[ty][tx] = TT.TG
                    }
                }

            // Old mine
            for (let dy = -3; dy <= 3; dy++)
                for (let dx = -4; dx <= 4; dx++) {
                    let tx = 150 + dx,
                        ty = 120 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        if (dx === 0 && dy === 0) map[ty][tx] = TT.CV;
                        else if (dy < 0) map[ty][tx] = TT.CL;
                        else map[ty][tx] = TT.D
                    }
                }

            // Ranger station building
            for (let dy = -1; dy <= 1; dy++)
                for (let dx = -2; dx <= 2; dx++) {
                    let tx = 100 + dx,
                        ty = 58 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        if (Math.abs(dx) <= 1 && Math.abs(dy) <= 0) map[ty][tx] = TT.H;
                        else map[ty][tx] = TT.D
                    }
                }

            // Cabin
            for (let dy = -1; dy <= 1; dy++)
                for (let dx = -1; dx <= 1; dx++) {
                    let tx = 90 + dx,
                        ty = 95 + dy;
                    if (tx >= 6 && tx < MW - 6 && ty >= 6 && ty < MH - 6) {
                        if (dx === 0 && dy === 0) map[ty][tx] = TT.CB;
                        else map[ty][tx] = TT.D
                    }
                }

            // Bridges over rivers at path crossings
            // Check where paths cross water and place bridges
            for (let y = 6; y < MH - 6; y++)
                for (let x = 6; x < MW - 6; x++) {
                    if (map[y][x] === TT.W) {
                        let adjPath = false;
                        for (let dy = -1; dy <= 1; dy++)
                            for (let dx = -1; dx <= 1; dx++) {
                                if (map[y + dy]?.[x + dx] === TT.P) adjPath = true
                            }
                        if (adjPath && r() < .4) map[y][x] = TT.BR
                    }
                }

        // ═══ NPC LIFE SYSTEM ═══════════════════════════════════════════
        // Each NPC has:
        //   sched  — daily schedule [{h, x, y, act, mood}]  h=hour (0-23)
        //   rel    — relationship level 0-3 (stranger→acquaintance→friendly→trusted)
        //   talkCt — times spoken to
        //   lastDay— last in-game day they were talked to
        //   mood   — current mood string (set by schedule + events)
        //   likes  — item IDs they appreciate as gifts
        //   dlgPool— [{cond:fn, lines:[...], emotion}] checked top-to-bottom,
        //             first truthy cond wins; falls back to dlg.default
        //
        // RELATIONSHIP LEVELS:
        //   0 = stranger  (first meeting)
        //   1 = acquaintance (talked once)
        //   2 = friendly  (talked 3× or gave gift)
        //   3 = trusted   (gave liked gift or completed their quest)
        //
        // HOW TO ADD A DIALOGUE POOL ENTRY:
        //   NPC.find(n=>n.id==='chen').dlgPool.push({
        //     cond:()=>G.weather==='rain',
        //     lines:[{s:'Chen Mei',t:'The rain worries me...',emotion:'worried'}]
        //   });
        //
        // HOW TO ADD A SCHEDULE STOP:
        //   Each entry = active FROM that hour until the next entry.
        //   {h:6, x:28*T, y:175*T, act:'Tending crops', mood:'focused'}
        // ══════════════════════════════════════════════════════════════

        // ── Helpers ────────────────────────────────────────────────────
        function getNpcSchedule(n) {
            if (!n.sched || !n.sched.length) return null;
            const h = Math.floor(G.ck.t / 60);
            let cur = n.sched[0];
            for (const s of n.sched) {
                if (h >= s.h) cur = s;
            }
            return cur;
        }

        function pickDlg(n) {
            // Check consequence overrides first
            if (n.dlg) {
                const stateKeys = Object.keys(n.dlg).filter(k => k !== 'default');
                for (const k of stateKeys) {
                    const flag = n.dlg[k];
                    if (G.cons.includes(k) || G.solved.includes(k)) return flag;
                }
            }
            // Check pool conditions
            if (n.dlgPool) {
                for (const p of n.dlgPool) {
                    if (p.cond && p.cond(n)) return p.lines;
                }
            }
            return n.dlg?.default || [];
        }

        function npcRelLabel(r) {
            return ['Stranger', 'Acquaintance', 'Friendly', 'Trusted'][r] || 'Stranger';
        }

        function npcMoodIcon(m) {
            return {
                happy: '😊',
                worried: '😟',
                sad: '😞',
                angry: '😠',
                busy: '😐',
                tired: '😴',
                focused: '🎯',
                content: '😌',
                curious: '🤔',
                scared: '😨',
                proud: '😤'
            } [m] || '😐';
        }

        function giftNpc(npc, itemId) {
            const m = G.inv.mats.find(x => x.id === itemId);
            if (!m || m.q < 1) return;
            uM(itemId, 1);
            const liked = npc.likes?.includes(itemId);
            if (liked) {
                npc.rel = Math.min(3, npc.rel + 1);
                no(`💝 ${npc.n} loved the ${m.n}!`);
                aJ(`Gift: ${m.n} → ${npc.n} (loved)`);
            } else {
                npc.rel = Math.min(3, npc.rel + 0.5 | 0);
                no(`🎁 ${npc.n} appreciated the ${m.n}.`);
            }
        }

        // Build gift dialogue choices for an NPC
        function buildGiftChoices(npc) {
            const avail = G.inv.mats.filter(m => m.q > 0).slice(0, 6);
            if (!avail.length) return [{
                t: 'Never mind',
                fn: () => {}
            }];
            return [
                ...avail.map(m => ({
                    t: `Give ${m.i} ${m.n} ×1` + (npc.likes?.includes(m.id) ? ' ♥' : ''),
                    fn: () => giftNpc(npc, m.id)
                })),
                {
                    t: 'Never mind',
                    fn: () => {}
                }
            ];
        }

        // Called on each NPC talk — bumps relationship
        function onTalkNpc(npc) {
            npc.talkCt = (npc.talkCt || 0) + 1;
            npc.lastDay = G.ck.day;
            if (npc.rel < 1) npc.rel = 1;
            if (npc.rel < 2 && npc.talkCt >= 3) npc.rel = 2;
        }

        // ── NPC movement toward schedule target ────────────────────────
        // Tiles NPCs cannot walk on
        const NPC_BLOCKED = new Set([TT.W, TT.DW, TT.CL, TT.CV, TT.TR, TT.DT, TT.BO, TT.R, TT.WL, TT.FC, TT.H, TT.CB, TT.CH, TT.SH, TT.ST, TT.FL]);
        // Tiles NPCs prefer (path bonus)
        const NPC_PATH_PREF = new Set([TT.P, TT.BR, TT.WH, TT.D]);

        function _npcTileWalkable(wx, wy) {
            const tx = Math.floor(wx / T),
                ty = Math.floor(wy / T);
            if (tx < 0 || tx >= MW || ty < 0 || ty >= MH) return false;
            return !NPC_BLOCKED.has(map[ty]?.[tx]);
        }

        function _npcTilePreferred(wx, wy) {
            const tx = Math.floor(wx / T),
                ty = Math.floor(wy / T);
            return NPC_PATH_PREF.has(map[ty]?.[tx]);
        }

        function uNPC() {
            const SPD = 0.7;
            for (const n of NPC) {
                if (!n.alive) continue;
                // Don't move NPCs that are currently "inside" a building
                if (_npcIsIndoors(n)) {
                    n.moving = false;
                    n.vx = 0;
                    n.vy = 0;
                    continue;
                }
                const sc = getNpcSchedule(n);
                if (!sc) continue;
                if (sc.mood) n.mood = sc.mood;
                n.act = sc.act || '';

                const tx = sc.x,
                    ty2 = sc.y;
                const dx = tx - n.x,
                    dy = ty2 - n.y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d <= 4) {
                    n.x = tx;
                    n.y = ty2;
                    n.moving = false;
                    continue;
                }

                n.moving = true;
                n.ft = (n.ft || 0) + 1;

                // Try direct move first
                const nx = n.x + dx / d * SPD,
                    ny = n.y + dy / d * SPD;
                if (_npcTileWalkable(nx, ny)) {
                    n.x = nx;
                    n.y = ny;
                    continue;
                }

                // Blocked — try sliding along X or Y
                const nx2 = n.x + dx / d * SPD,
                    ny2 = n.y;
                const nx3 = n.x,
                    ny3 = n.y + dy / d * SPD;
                // Prefer the slide direction that also keeps us on a walkable/path tile
                const xOk = _npcTileWalkable(nx2, ny2);
                const yOk = _npcTileWalkable(nx3, ny3);
                if (xOk && (!yOk || _npcTilePreferred(nx2, ny2))) {
                    n.x = nx2;
                    n.y = ny2;
                } else if (yOk) {
                    n.x = nx3;
                    n.y = ny3;
                } else {
                    // Both blocked — try 8 compass directions at SPD and pick walkable one closest to target
                    let bestD = Infinity,
                        bestX = n.x,
                        bestY = n.y;
                    for (let a = 0; a < 8; a++) {
                        const ang = a * Math.PI / 4;
                        const cx2 = n.x + Math.cos(ang) * SPD,
                            cy2 = n.y + Math.sin(ang) * SPD;
                        if (!_npcTileWalkable(cx2, cy2)) continue;
                        const dd = Math.hypot(cx2 - tx, cy2 - ty2);
                        if (dd < bestD) {
                            bestD = dd;
                            bestX = cx2;
                            bestY = cy2;
                        }
                    }
                    n.x = bestX;
                    n.y = bestY;
                }
            }
        }

    if (sc && sc.indoors === true) {

        return;
    }
    
    onTalkNpc(npc);

        prefix = [{ s: npc.n, t: `*${sc.act}*`, emotion: 'neutral' }]; 
    } 
    
    // Append relationship-sensitive closing choices 
    const choices = [
        { 
            t: `🎁 Give a gift… (${npcRelLabel(npc.rel)})`, 
            fn: () => { 
                sDlg([{ 
                    s: npc.n, 
                    t: 'Oh? What have you got there?', 
                    emotion: 'curious',

            } 
        }, 
        { 
            t: 'Goodbye.', 
            fn: () => {} 
        } 
    ]; // <--- Fixed: Added missing closing bracket and parenthesis here!
    
    const allLines = [...prefix, ...lines, { s: npc.n, t: ' ', emotion: 'neutral', ch: choices }]; 
    sDlg(allLines);

            let rare = av.filter(m => m.rare);
            let normal = av.filter(m => !m.rare);
            let pick = Math.random() < .1 && rare.length ? rare[Math.floor(Math.random() * rare.length)] : normal[Math.floor(Math.random() * normal.length)];
            if (!pick) return false;
            if (Math.random() < .55) {
                aM(pick.id, 1);
                no('📦 ' + pick.n);
                G.p.en = Math.max(0, G.p.en - 1.5);
                return true
            }
            return false
        }

        // Interior state
        let currentInterior = null;
        let interiorPlayerX = 0,
            interiorPlayerY = 0;

        function sleepInCabin() {
            G.ck.t = 420;
            G.ck.day = (G.ck.day || 1) + 1;
            G.p.en = G.p.men;
            G.p.hp = Math.min(G.p.mhp, G.p.hp + 20);
            G.p.hy = Math.min(G.p.mhy, G.p.hy + 30);
            no('💤 Slept. Day ' + G.ck.day + '. Fully rested.');
            aJ('Slept. Day ' + G.ck.day);
        }

        function enterBuilding(id) {
            if (_exitCooldown > 0) return false;
            const interior = INTERIORS[id];
            if (!interior) return false;
            currentInterior = id;
            interiorPlayerX = interior.spawnX * T + T / 2;
            interiorPlayerY = interior.spawnY * T + T / 2;
            no('🚪 Entered ' + interior.name);
            return true;
        }

        let _exitCooldown = 0;

        function exitBuilding() {
            if (!currentInterior) return;
            const interior = INTERIORS[currentInterior];
            // Push 2.5 tiles south of the door row so player is clear of ALL building tiles
            G.p.x = interior.returnX;
            G.p.y = interior.returnY + T * 1.5;
            G.cam.x = G.p.x - cv.width / 2;
            G.cam.y = G.p.y - cv.height / 2;
            currentInterior = null;
            _exitCooldown = 60; // 1 second grace period — ignore door re-trigger
            no('🚪 Left the building');
        }

        function getInteriorTile(tx, ty) {
            if (!currentInterior) return 0;
            const interior = INTERIORS[currentInterior];
            if (tx < 0 || ty < 0 || tx >= interior.w || ty >= interior.h) return 1;
            return interior.map[ty]?.[tx] ?? 1;
        }

        function isInteriorSolid(px, py) {
            return INTERIOR_SOLID.has(getInteriorTile(Math.floor(px / T), Math.floor(py / T)));
        }

        function isOnDoor(px, py) {
            return getInteriorTile(Math.floor(px / T), Math.floor(py / T)) === 2;
        }

        function updateInteriorMovement() {
            if (!currentInterior) return;
            const SPD = 2.5;
            let dx = 0,
                dy = 0;
            if (K['w'] || K['arrowup']) dy = -SPD;
            if (K['s'] || K['arrowdown']) dy = SPD;
            if (K['a'] || K['arrowleft']) dx = -SPD;
            if (K['d'] || K['arrowright']) dx = SPD;
            if (dx && dy) {
                dx *= 0.707;
                dy *= 0.707;
            }
            const m = T * 0.3;
            const nx = interiorPlayerX + dx,
                ny = interiorPlayerY + dy;
            if (!isInteriorSolid(nx - m, ny - m) && !isInteriorSolid(nx + m, ny - m) && !isInteriorSolid(nx - m, ny + m) && !isInteriorSolid(nx + m, ny + m)) {
                interiorPlayerX = nx;
                interiorPlayerY = ny;
            } else {
                if (dx && !isInteriorSolid(interiorPlayerX + dx - m, interiorPlayerY - m) && !isInteriorSolid(interiorPlayerX + dx + m, interiorPlayerY + m)) interiorPlayerX += dx;
                if (dy && !isInteriorSolid(interiorPlayerX - m, interiorPlayerY + dy - m) && !isInteriorSolid(interiorPlayerX + m, interiorPlayerY + dy + m)) interiorPlayerY += dy;
            }
            if (isOnDoor(interiorPlayerX, interiorPlayerY)) exitBuilding();
        }

        function tryInteriorInteract() {
            if (!currentInterior) return false;
            const interior = INTERIORS[currentInterior];
            const ptx = Math.floor(interiorPlayerX / T),
                pty = Math.floor(interiorPlayerY / T);
            if (interior.interactions) {
                for (const spot of interior.interactions) {
                    if (Math.abs(ptx - spot.x) + Math.abs(pty - spot.y) <= 1.5) {
                        spot.fn();
                        return true;
                    }
                }
            }
            for (const npcId of (interior.npcsInside || [])) {
                const npc = NPC.find(n => n.id === npcId);
                if (!npc) continue;
                talkToNpc(npc);
                return true;
            }
            return false;
        }

        function drawInterior() {
            if (!currentInterior) return;
            const interior = INTERIORS[currentInterior];
            const camX = interiorPlayerX - cv.width / 2,
                camY = interiorPlayerY - cv.height / 2;
            c.fillStyle = '#1a1510';
            c.fillRect(0, 0, cv.width, cv.height);
            for (let ty = 0; ty < interior.h; ty++) {
                for (let tx = 0; tx < interior.w; tx++) {
                    const tile = interior.map[ty][tx];
                    const di = INTERIOR_TILE_DRAW[tile] || INTERIOR_TILE_DRAW[0];
                    const sx = tx * T - camX,
                        sy = ty * T - camY;
                    if (sx < -T || sx > cv.width + T || sy < -T || sy > cv.height + T) continue;
                    c.fillStyle = di.bg;
                    c.fillRect(sx, sy, T, T);
                    c.strokeStyle = di.border;
                    c.lineWidth = 0.5;
                    c.strokeRect(sx, sy, T, T);
                    if (di.icon) {
                        c.font = (T * 0.5) + 'px serif';
                        c.textAlign = 'center';
                        c.textBaseline = 'middle';
                        c.fillStyle = '#ffffff88';
                        c.fillText(di.icon, sx + T / 2, sy + T / 2);
                    }
                }
            }
            // Interaction spots
            if (interior.interactions) {
                const pulse = 0.5 + Math.sin(Date.now() / 400) * 0.5;
                const ptx = Math.floor(interiorPlayerX / T),
                    pty = Math.floor(interiorPlayerY / T);
                for (const spot of interior.interactions) {
                    const sx = spot.x * T - camX,
                        sy = spot.y * T - camY;
                    c.fillStyle = `rgba(100,255,150,${0.18*pulse})`;
                    c.fillRect(sx - 2, sy - 2, T + 4, T + 4);
                    c.font = (T * 0.55) + 'px serif';
                    c.textAlign = 'center';
                    c.textBaseline = 'middle';
                    c.fillText(spot.icon, sx + T / 2, sy + T / 2);
                    if (Math.abs(ptx - spot.x) + Math.abs(pty - spot.y) <= 2) {
                        c.font = '9px monospace';
                        c.fillStyle = '#a0ffa0';
                        c.fillText('[E] ' + spot.label, sx + T / 2, sy - 6);
                    }
                }
            }
            // NPCs inside
            for (const npcId of (interior.npcsInside || [])) {
                const npc = NPC.find(n => n.id === npcId);
                if (!npc) continue;
                const npcIX = (interior.w / 2 | 0) * T + T / 2,
                    npcIY = (interior.h / 2 | 0) * T;
                const sx = npcIX - camX,
                    sy = npcIY - camY;
                c.fillStyle = 'rgba(0,0,0,0.2)';
                c.beginPath();
                c.ellipse(sx, sy + T * 0.4, T * 0.25, T * 0.08, 0, 0, Math.PI * 2);
                c.fill();
                c.font = (T * 0.65) + 'px serif';
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.fillText(npc.i, sx, sy);
                c.font = '9px monospace';
                c.fillStyle = npc.col || '#fff';
                c.fillText(npc.n, sx, sy - T * 0.5);
                c.fillText(npcMoodIcon(npc.mood || 'content'), sx, sy - T * 0.35);
                const dist = Math.hypot(interiorPlayerX - npcIX, interiorPlayerY - npcIY);
                if (dist < T * 2) {
                    c.font = '9px monospace';
                    c.fillStyle = '#ffd700';
                    c.fillText('[E] Talk', sx, sy + T * 0.55);
                }
            }
            // Player
            const px = interiorPlayerX - camX,
                py = interiorPlayerY - camY;
            c.fillStyle = 'rgba(0,0,0,0.25)';
            c.beginPath();
            c.ellipse(px, py + T * 0.35, T * 0.22, T * 0.07, 0, 0, Math.PI * 2);
            c.fill();
            c.font = (T * 0.65) + 'px serif';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText('🧑‍🔬', px, py);
            // Tint
            if (interior.lightTint) {
                c.fillStyle = interior.lightTint;
                c.fillRect(0, 0, cv.width, cv.height);
            }
            // Vignette
            const vg = c.createRadialGradient(cv.width / 2, cv.height / 2, cv.width * 0.2, cv.width / 2, cv.height / 2, cv.width * 0.7);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,0.4)');
            c.fillStyle = vg;
            c.fillRect(0, 0, cv.width, cv.height);
            // Header
            c.font = 'bold 14px monospace';
            c.fillStyle = '#ffd700';
            c.textAlign = 'center';
            c.fillText(interior.ambience + ' ' + interior.name, cv.width / 2, 22);
            c.font = '10px monospace';
            c.fillStyle = '#88aa88';
            c.fillText('Walk to 🚪 to exit', cv.width / 2, cv.height - 12);
        }

        function wrapText(ctx, text, maxW) {
            const words = text.split(' ');
            const lines = [];
            let cur = '';
            for (const w of words) {
                const test = cur ? cur + ' ' + w : w;
                if (ctx.measureText(test).width > maxW && cur) {
                    lines.push(cur);
                    cur = w;
                } else cur = test;
            }
            if (cur) lines.push(cur);
            return lines;
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function _npcIsIndoors(npc) {
            // 1. Player is inside a building → interior renderer handles those NPCs
            if (currentInterior) {
                const ci = INTERIORS[currentInterior];
                if (ci && ci.npcsInside && ci.npcsInside.includes(npc.id)) return true;
                return false;
            }
            // 2. NPC's current schedule entry is Sleeping OR has indoors:true flag → hide them

        function drawNpcEnhanced(npc, camX, camY) {
            if (!npc.alive) return;
            if (currentInterior) {
                // Only draw NPCs belonging to this interior — handled by drawInterior()
                return;
            }
            // Hide NPC if they're supposed to be indoors right now
            if (_npcIsIndoors(npc)) return;
            const sx = npc.x - camX,
                sy = npc.y - camY;
            if (sx < -T * 2 || sx > cv.width + T * 2 || sy < -T * 2 || sy > cv.height + T * 2) return;
            const dist = Math.hypot(npc.x - G.p.x, npc.y - G.p.y);
            const bob = npc.moving ? Math.sin((npc.ft || 0) * 0.15) * 2.5 : Math.sin(Date.now() / 900 + npc.x) * 0.4;
            c.fillStyle = npc.col || '#888';
            c.globalAlpha = 0.25;
            c.beginPath();
            c.arc(sx, sy - 2 + bob, T * 0.3, 0, Math.PI * 2);
            c.fill();
            c.globalAlpha = 1;
            c.font = (T * 0.65) + 'px serif';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText(npc.i, sx, sy - 2 + bob);
            const na = dist < 100 ? 1 : dist < 160 ? (160 - dist) / 60 : 0;
            if (na > 0) {
                c.globalAlpha = na;
                c.font = 'bold 9px monospace';
                const nw = c.measureText(npc.n).width + 8;
                c.fillStyle = 'rgba(0,0,0,0.65)';
                const ny = sy - T * 0.55 + bob;
                c.fillRect(sx - nw / 2, ny - 7, nw, 14);
                c.fillStyle = npc.col || '#fff';
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.fillText(npc.n, sx, ny);
                c.font = '10px serif';

        let _hclAnim = null;

        function pourHCl(stepId) {
            if (window._hclPoured) return;
            window._hclPoured = true;
            const cv2 = document.getElementById('hclCv');
            if (!cv2) return;
            const ctx = cv2.getContext('2d');
            const s = window._hclStep;
            // Determine reaction strength from step content
            const strong = s && (s.r || '').toLowerCase().includes('vigorous');
            let t = 0,
                bubbles = [];
            document.getElementById('pourBtn').disabled = true;
            // Animate fizzing
            _hclAnim = setInterval(() => {
                t++;
                // Redraw base
                ctx.fillStyle = '#0d1a10';
                ctx.fillRect(0, 0, 320, 180);
                ctx.fillStyle = '#5a4a38';
                ctx.fillRect(90, 80, 140, 70);
                ctx.fillStyle = '#6a5a48';
                ctx.fillRect(95, 85, 130, 60);
                // Acid drop
                if (t < 30) {
                    ctx.fillStyle = 'rgba(180,230,100,0.7)';
                    ctx.beginPath();
                    ctx.arc(160, 30 + t * 1.5, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(180,230,100,0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(160, 5);
                    ctx.lineTo(160, 30 + t * 1.5);
                    ctx.stroke();
                }
                // Acid puddle spreading
                if (t >= 20) {
                    const spread = Math.min((t - 20) * 2, 60);
                    ctx.fillStyle = 'rgba(160,220,80,0.25)';
                    ctx.fillRect(130, 90, spread, 30);
                }

                if (t >= 25 && Math.random() < (strong ? 0.4 : 0.12)) {

                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);

        function openCompassMinigame(step, onComplete) {
            document.getElementById('iP').innerHTML = `
  <button class="cb" onclick="X()">✕</button>
  <div class="pt">🧭 Measure Bedding Strike</div>

        function _initCompassCanvas() {
            const cv2 = document.getElementById('compCv');
            if (!cv2) return;
            _drawCompass(cv2, 0);
            let dragging = false;
            const getAngle = e => {
                const r = cv2.getBoundingClientRect();
                const cx2 = r.left + 140,
                    cy2 = r.top + 140;
                return Math.atan2(e.clientY - cy2, e.clientX - cx2) * 180 / Math.PI + 90;
            };
            cv2.onmousedown = e => {
                dragging = true;
                window._compassAngle = getAngle(e);
                _drawCompass(cv2, window._compassAngle);
                document.getElementById('bearingVal').textContent = String(Math.round(((window._compassAngle % 360) + 360) % 360)).padStart(3, '0') + '°'
            };
            cv2.onmousemove = e => {
                if (!dragging) return;
                window._compassAngle = getAngle(e);
                _drawCompass(cv2, window._compassAngle);
                document.getElementById('bearingVal').textContent = String(Math.round(((window._compassAngle % 360) + 360) % 360)).padStart(3, '0') + '°'
            };
            cv2.onmouseup = () => {
                dragging = false
            };
        }

        function _drawCompass(cv2, angle) {
            const ctx = cv2.getContext('2d'),
                W = 280,
                cx2 = 140,
                cy2 = 140,
                R = 120;
            ctx.clearRect(0, 0, W, W);
            // Background
            ctx.fillStyle = '#1a1428';
            ctx.beginPath();
            ctx.arc(cx2, cy2, R + 4, 0, Math.PI * 2);
            ctx.fill();
            // Degree ring
            ctx.strokeStyle = '#3d3652';
            ctx.lineWidth = 1;
            for (let deg = 0; deg < 360; deg += 10) {
                const a2 = (deg - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(cx2 + Math.cos(a2) * (R - 8), cy2 + Math.sin(a2) * (R - 8));
                ctx.lineTo(cx2 + Math.cos(a2) * R, cy2 + Math.sin(a2) * R);
                ctx.stroke();
                if (deg % 30 === 0) {
                    ctx.fillStyle = '#9c90b8';
                    ctx.font = '10px VT323,monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(deg, cx2 + Math.cos(a2) * (R - 18), cy2 + Math.sin(a2) * (R - 18));
                }
            }
            const dirs = ['N', 'E', 'S', 'W'];
            dirs.forEach((d, i) => {
                const a2 = (i * 90 - 90) * Math.PI / 180;
                ctx.fillStyle = d === 'N' ? '#ff6060' : '#deeed6';
                ctx.font = 'bold 14px VT323,monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(d, cx2 + Math.cos(a2) * (R - 30), cy2 + Math.sin(a2) * (R - 30));
            });
            // Compass needle
            const na = (angle - 90) * Math.PI / 180;
            ctx.fillStyle = '#ff4040';
            ctx.beginPath();
            ctx.moveTo(cx2 + Math.cos(na) * 80, cy2 + Math.sin(na) * 80);
            ctx.lineTo(cx2 + Math.cos(na + Math.PI / 2) * 8, cy2 + Math.sin(na + Math.PI / 2) * 8);
            ctx.lineTo(cx2, cy2);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#b0b0c0';
            ctx.beginPath();
            ctx.moveTo(cx2 + Math.cos(na + Math.PI) * 60, cy2 + Math.sin(na + Math.PI) * 60);
            ctx.lineTo(cx2 + Math.cos(na + Math.PI / 2) * 8, cy2 + Math.sin(na + Math.PI / 2) * 8);
            ctx.lineTo(cx2, cy2);
            ctx.closePath();
            ctx.fill();
            // Strike line overlay
            ctx.strokeStyle = 'rgba(100,200,255,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(cx2 + Math.cos(na) * 70, cy2 + Math.sin(na) * 70);
            ctx.lineTo(cx2 + Math.cos(na + Math.PI) * 70, cy2 + Math.sin(na + Math.PI) * 70);
            ctx.stroke();
            ctx.setLineDash([]);
            // Center dot
            ctx.fillStyle = '#deeed6';
            ctx.beginPath();
            ctx.arc(cx2, cy2, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // ── Route step to correct minigame ─────────────────────────────
        function dS(i) {
            const s = cI.inv.steps[i];
            if (iD.includes(s.id)) return;
            // Check tool requirement (except hardness test & plant survey)
            if (!s.ht && s.tl !== 'hand' && G.tool !== s.tl) {
                no(`Need ${tn(s.tl)}! Press ${['hand','hammer','lens','acid','compass','camera'].indexOf(s.tl)+1}`);
                return;
            }

            const done = (sid) => {
                if (!iD.includes(sid)) iD.push(sid);
                const step = cI.inv.steps.find(x => x.id === sid);
                if (step?.sm) aS(step.sm);
                if (step?.ap) step.ap.forEach(p => aPl(p));
                G.p.en = Math.max(0, G.p.en - 2);
                rI();
                chkID();
            };

            // Route to minigame based on step type
            if (s.ht) { // hardness/scratch test
                openScratchMinigame(s, done);
            } else if (s.tl === 'acid') {
                openHClMinigame(s, done);
            } else if (s.tl === 'compass') {
                openCompassMinigame(s, done);
            } else if (s.tl === 'camera') {
                openPhotoMinigame(s, done);
            } else {
                // Hand / lens — instant with flavour text
                done(s.id);
                no('🔍 ' + s.r.split('.')[0] + '.');
            }
        }

        // Interact
        function getNb() {
            let px = G.p.x,
                py = G.p.y,
                rg = 50;
            let cbDx = px - 90 * T - 16,
                cbDy = py - 97 * T;
            if (Math.sqrt(cbDx * cbDx + cbDy * cbDy) < rg) return {
                ty: 'cabin'
            };
            // Building doors
            const bDoor = checkBuildingEntry();
            if (bDoor) return {
                ty: 'building',
                d: bDoor.door
            };
            for (let s of SITES) {
                if (!s.vis) continue;
                if (s.req.length && !s.req.every(r => G.clues.includes(r))) continue;
                let dx = px - s.x,
                    dy = py - s.y;
                if (Math.sqrt(dx * dx + dy * dy) < rg) return {
                    ty: 'site',
                    d: s
                }
            }
            for (let n of NPC) {
                if (!n.alive) continue;
                let dx = px - n.x,
                    dy = py - n.y;
                if (Math.sqrt(dx * dx + dy * dy) < rg) return {
                    ty: 'npc',
                    d: n
                }
            }
            return null
        }

        function tryI() {
            if (currentInterior) {
                tryInteriorInteract();
                return;
            }
            if (CABIN_ACTIVE) {
                let furn = getNearCabinFurniture(G.p.x, G.p.y, T);
                if (furn) handleCabinInteraction(furn.id);
                return;
            }
            let t = getNb();
            if (t) {
                if (t.ty === 'npc') {
                    talkToNpc(t.d);
                    return
                }
                if (t.ty === 'cabin') {
                    enterCabinInterior();
                    return
                }
                if (t.ty === 'building') {
                    enterBuilding(t.d.building);
                    return
                }
                if (t.ty === 'site') {
                    let s = t.d;
                    if (s.ex && s.th) {
                        openTh(s);
                        return
                    }
                    if (!s.ex) {
                        openInv(s);
                        return
                    }
                    sDlg([{
                        s: 'Dr. Petra',
                        t: 'Fully investigated. All evidence gathered.'
                    }]);
                    return
                }
            }
            if (!tryGather()) {
                let tx = Math.floor(G.p.x / T),
                    ty = Math.floor(G.p.y / T);
                let near = false;
                for (let dy = -1; dy <= 1; dy++)
                    for (let dx = -1; dx <= 1; dx++) {
                        if (map[ty + dy]?.[tx + dx] === TT.W) near = true
                    }
                if (near) {
                    G.p.hy = Math.min(G.p.mhy, G.p.hy + 6);
                    no('💧 Drank (+6)');
                    aM('water_r', 1)
                }
            }
        }

        function tryPl() {
            let tx = Math.floor(G.p.x / T),
                ty = Math.floor(G.p.y / T);
            let bms = new Set();
            for (let dy = -2; dy <= 2; dy++)
                for (let dx = -2; dx <= 2; dx++) {
                    let b = gBm(tx + dx, ty + dy);
                    if (b) bms.add(b)
                }
            let found = PL.filter(p => p.bm.some(b => bms.has(b)) && !G.plants.includes(p.id));
            if (found.length) {
                let pl = found[Math.floor(Math.random() * found.length)];
                aPl(pl.id);
                sDlg([{
                    s: 'Dr. Petra',
                    t: `${pl.pp} — ${pl.sc}!`
                }, {
                    s: 'Dr. Petra',
                    t: pl.d
                }, {
                    s: 'Dr. Petra',
                    t: 'Indicator: ' + pl.ind
                }])
            } else sDlg([{
                s: 'Dr. Petra',
                t: 'No new plants here. Try different terrain.'
            }])
        }
