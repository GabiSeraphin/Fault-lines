        function rBP(pk) {
            let c = document.getElementById('bCA'),

            d.classList.remove('s');
            switch (pk) {
                case 'samples':
                    let it = [...G.inv.samples, ...G.inv.mats.filter(m => m.q > 0)];
                    if (!it.length) {
                        c.innerHTML = '<p style="color:#888;text-align:center;padding:14px">Nothing collected yet.</p>';

                    c.innerHTML = '<div class="bg-grid">' + it.map(s => {

                        return `<div class="bi" onclick="shSD('${s.id}')" ${s.eat?`ondblclick="eatI('${s.id}')"`:''}><span class="ic">${s.i}</span><span class="nm">${s.n}${q}${e}</span></div>`
                    }).join('') + '</div>';
                    break;
                case 'tools':
                    c.innerHTML = '<div class="bg-grid">' + G.inv.tools.map(t => `<div class="bi" onclick="shTD('${t.id}')"><span class="ic">${t.i}</span><span class="nm">${t.n}</span></div>`).join('') + '</div>';
                    break;
                case 'journal':
                    if (!G.jl.length) {
                        c.innerHTML = '<p style="color:#888;text-align:center;padding:14px">No entries.</p>';
                        return
                    }
                    c.innerHTML = [...G.jl].reverse().map(j => `<div class="je"><span class="jt">[D${j.dy} ${j.cl}]</span> ${j.tx}</div>`).join('');
                    break;
                case 'plants':
                    if (!G.plants.length) {
                        c.innerHTML = '<p style="color:#888;text-align:center;padding:14px">Press N near different terrain!</p>';
                        return
                    }
                    c.innerHTML = G.plants.map(pid => {
                        let p = PL.find(x => x.id === pid);
                        if (!p) return '';
                        return `<div class="pe"><div class="pi">${p.i}</div><div><div class="pn">${p.pp}</div><div class="ps">${p.sc}</div><div class="pd">${p.ind}</div></div></div>`
                    }).join('');
                    break;
                case 'theories':
                    let h2 = '';
                    SITES.forEach(s => {
                        if (!s.vis) return;
                        let st, co;
                        if (!s.ex) {
                            st = '🔲 Not investigated';
                            co = '#888'
                        } else if (s.th) {
                            st = '🔶 Theory needed (E)';
                            co = '#ffa500'
                        } else if (G.solved.some(p => s.id.includes(p))) {

                    }
                    c.innerHTML = h2 || '<p style="color:#888;text-align:center;padding:14px">No data yet.</p>';
                    break
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // TILE VARIATION SYSTEM
        // ─────────────────────────────────────────────────────────────
        // Each tile position gets a deterministic random value — the same
        // variant always shows on the same tile, no flickering.
        //
        // HOW TO ADD VARIANTS:
        //   TILE_VARIANTS[TT.G].push({
        //     weight: 0.08,                         // 8% chance
        //     draw: (c, sx, sy, T, r1, r2) => {    // r1 & r2 are 0–1 floats, unique per tile
        //       // your canvas drawing code here
        //     }
        //   });
        //
        // HOW TO ADD A SPRITE-SHEET VARIANT (when your art is ready):
        //   TILE_VARIANTS[TT.G].push({
        //     weight: 0.06,
        //     img:   myLoadedImage,        // HTMLImageElement
        //     frame: {x:0, y:32, w:32, h:32}  // source rect on the sheet
        //   });
        //
        // WEIGHTS: they are independent — a tile rolls once and takes the
        // first variant whose cumulative weight covers the roll, or draws
        // nothing extra if the roll exceeds all weights combined.
        // Tip: keep total weight per tile ≤ 0.5 so most tiles stay plain.
        // ═══════════════════════════════════════════════════════════════

        // ─── Deterministic per-tile hash ────────────────────────────
        // Returns a stable float [0, 1) for a given (x, y, salt).
        // salt lets you get independent values from the same tile.
        function tileRand(x, y, salt = 0) {
            let h = (x * 1664525 + y * 1013904223 + salt * 22695477) >>> 0;
            h ^= h >>> 16;
            h = Math.imul(h, 0x45d9f3b) >>> 0;
            h ^= h >>> 16;
            return (h >>> 0) / 0xffffffff;
        }

        // ─── Variant table ───────────────────────────────────────────
        // Key: TT tile constant.  Value: array of variant definitions.
        // Add your own entries anywhere after this block.
        const TILE_VARIANTS = {};

        // Helper: declare variants cleanly
        function defVariants(tileKey, ...variants) {
            TILE_VARIANTS[tileKey] = variants;
        }

        // ─── GRASS (TT.G) ────────────────────────────────────────────

                    c.fill();
                    c.fillStyle = '#e8d820';
                    c.beginPath();
                    c.arc(px, py, 1, 0, Math.PI * 2);
                    c.fill();
                    // second flower offset
                    const px2 = sx + T - 6 - Math.floor(r2 * 8),
                        py2 = sy + T - 6 - Math.floor(r1 * 8);
                    c.fillStyle = '#f0e090';
                    c.beginPath();
                    c.arc(px2, py2, 1.5, 0, Math.PI * 2);
                    c.fill();

        // ─── Variant renderer — called from dT ───────────────────────
        // Picks one variant per tile (deterministically), draws it,
        // or does nothing if the tile's roll doesn't hit any variant.
        function drawTileVariant(x, y, tileType, sx, sy) {
            const variants = TILE_VARIANTS[tileType];
            if (!variants || variants.length === 0) return;

            // Single deterministic roll for variant selection
            const roll = tileRand(x, y, 0);
            // Secondary float for positional/color sub-variation inside the variant
            const r2 = tileRand(x, y, 1);

            let cumulative = 0;
            for (const v of variants) {
                cumulative += v.weight;
                if (roll < cumulative) {
                    // ── Sprite-sheet branch (for when your art is ready) ──
                    if (v.img && v.img.complete && v.frame) {
                        const fr = v.frame;
                        c.drawImage(v.img, fr.x, fr.y, fr.w, fr.h, sx, sy, T, T);
                        return;
                    }
                    // ── Procedural / canvas draw branch ───────────────────
                    if (v.draw) v.draw(c, sx, sy, T, roll, r2);
                    return;
                }
            }
            // roll ≥ total weight → plain tile, nothing extra drawn
        }

        // ─────────────────────────────────────────────────────────────
        // HOW TO ADD YOUR OWN VARIANT ANYWHERE IN THE CODE:
        //
        //   TILE_VARIANTS[TT.G].push({
        //     weight: 0.06,           // 6% of grass tiles show this
        //     draw(c, sx, sy, T, r1, r2) {
        //       // r1 = 0–1 stable float (same tile = same r1 forever)
        //       // r2 = independent stable float (for offsets, colours…)
        //       c.drawImage(myGrassFlowerImage, sx, sy, T, T); // your sprite
        //     }
        //   });
        //
        // HOW TO REGISTER A SPRITE SHEET VARIANT:
        //
        //   const sheet = new Image(); sheet.src = 'tiles.png';
        //   TILE_VARIANTS[TT.G].push({
        //     weight: 0.05,
        //     img:   sheet,
        //     frame: {x:32, y:0, w:32, h:32}  // where on the sheet
        //   });
        //
        // HOW TO ADD A COMPLETELY NEW TILE TYPE:
        //
        //   defVariants(TT.YOUR_TILE,
        //     { weight: 0.10, draw(c,sx,sy,T,r1,r2){ /* … */ } }
        //   );
        // ─────────────────────────────────────────────────────────────

        function dT(x, y, t, sx, sy) {
            let cl = TC[t] || ['#333', '#333', '#333'];
            c.fillStyle = cl[(x * 7 + y * 13) % 3];
            c.fillRect(sx, sy, T, T);
            switch (t) {
                case TT.TR:
                    c.fillStyle = '#5a4030';

                case TT.DT:
                    c.fillStyle = '#0e1a0e';

                    c.fillStyle = cl[0];
                    c.beginPath();
                    c.arc(sx + 16, sy + 16, 16, 0, Math.PI * 2);
                    c.fill();
                    break;
                case TT.W:
                                        // 1. Inicializa o array com todos os teus 8 frames apenas na primeira execução
                    if (!window.waterFrames) {
                        window.waterFrames = [];
                        let frameUrls = [
                            'https://i.postimg.cc/qvYxMX4G/frame-0-delay-0-16s.png',
                            'https://i.postimg.cc/sg84D9s9/frame-1-delay-0-16s.png',
                            'https://i.postimg.cc/FHqVsgNj/frame-2-delay-0-16s.png',
                            'https://i.postimg.cc/Mp4mKbqj/frame-3-delay-0-16s.png',
                            'https://i.postimg.cc/cLjB4M0Y/frame-4-delay-0-16s.png',
                            'https://i.postimg.cc/7ZcnYMw2/frame-5-delay-0-16s.png',
                            'https://i.postimg.cc/t4fNCtp6/frame-6-delay-0-16s.png',
                            'https://i.postimg.cc/mgqy2NB7/frame-7-delay-0-16s.png'
                        ];

                        frameUrls.forEach(url => {
                            let img = new Image();
                            img.src = url;
                            window.waterFrames.push(img);
                        });
                    }

                    // 2. Calcula qual o frame a exibir com base no tempo de jogo (160ms por frame)
                    let indiceFrame = Math.floor((Date.now() / 160) % window.waterFrames.length);
                    let frameAtivo = window.waterFrames[indiceFrame];

                    // 3. Se o frame atual já carregou da internet, desenha-o no fundo
                    if (frameAtivo && frameAtivo.complete && frameAtivo.naturalWidth !== 0) {
                        c.drawImage(frameAtivo, sx, sy, T, T);
                    } else {
                        // Caso contrário, mantém a cor de segurança para o ecrã não piscar
                        c.fillStyle = cl[0];
                        c.fillRect(sx, sy, T, T);
                    }

                    break;
                case TT.CL:
                    for (let i = 0; i < 3; i++) {
                        c.fillStyle = i % 2 ? '#666' : '#555';
                        c.fillRect(sx, sy + i * 11, T, 9)
                    }
                    break;
                case TT.H:
                    c.fillStyle = '#a07050';
                    c.fillRect(sx + 1, sy + 6, T - 2, T - 8);
                    c.fillStyle = '#8b4513';
                    c.beginPath();
                    c.moveTo(sx, sy + 8);
                    c.lineTo(sx + T / 2, sy);
                    c.lineTo(sx + T, sy + 8);
                    c.fill();
                    c.fillStyle = '#ffd700';
                    c.fillRect(sx + 12, sy + 16, 8, 8);

                case TT.CB:
                    c.fillStyle = '#8b6040';
                    c.fillRect(sx + 1, sy + 4, T - 2, T - 6);
                    c.fillStyle = '#6b4020';
                    c.beginPath();
                    c.moveTo(sx - 1, sy + 6);
                    c.lineTo(sx + T / 2, sy - 2);
                    c.lineTo(sx + T + 1, sy + 6);
                    c.fill();
                    c.fillStyle = '#ffa500';
                    c.fillRect(sx + 13, sy + 14, 6, 6);
                    c.fillStyle = '#555';
                    c.fillRect(sx + 22, sy - 2, 5, 8);

                case TT.FC:
                    c.fillStyle = '#222';
                    c.fillRect(sx + 13, sy, 6, T);
                    c.fillStyle = '#555';
                    c.fillRect(sx, sy, 13, T);
                    c.fillStyle = '#666';
                    c.fillRect(sx + 19, sy, 13, T);
                    break;
                case TT.EX:
                    for (let i = 0; i < 3; i++) {
                        c.fillStyle = ['#7a7060', '#8a8070', '#6a6050'][i];
                        c.fillRect(sx, sy + i * 11, T, 9)
                    }
                    break;
                case TT.LS:
                    c.fillStyle = '#5a4530';
                    for (let i = 0; i < 4; i++) c.fillRect(sx + ((x * 7 + i * 13) % (T - 6)), sy + ((y * 11 + i * 7) % (T - 6)), 6, 4);
                    break;
                case TT.BU:
                    c.fillStyle = '#2d6b2e';
                    c.beginPath();
                    c.arc(sx + 16, sy + 20, 12, 0, Math.PI * 2);

                case TT.TG:

                case TT.P:
                    c.fillStyle = '#b0a07a';
                    for (let i = 0; i < 2; i++) c.fillRect(sx + ((x * 11 + i * 7) % (T - 3)), sy + ((y * 13 + i * 5) % (T - 3)), 2, 2);

                    c.fillStyle = '#5a6a5a';

                    }

        const wild = [];
        // ── Animal system ──────────────────────────────────────────────
        const ANIMAL_BLOCKED_TILES = new Set([TT.W, TT.DW, TT.R, TT.WL, TT.CL, TT.CV, TT.BO, TT.FC, TT.H, TT.CB, TT.CH, TT.SH, TT.TR, TT.DT]);
        const FLYING_ANIMALS = new Set(['🦅', '🦋']);
        const ANIMAL_STATE = {
            IDLE: 'idle',
            GRAZING: 'grazing',
            WALKING: 'walking',
            FLEEING: 'fleeing',
            SLEEPING: 'sleeping'
        };

        function _animalTileWalkable(wx, wy, isFlying) {
            const tx = Math.floor(wx / T),
                ty = Math.floor(wy / T);
            if (tx < 0 || tx >= MW || ty < 0 || ty >= MH) return false;
            const tile = map[ty]?.[tx];
            if (isFlying) return tile !== undefined;
            return !ANIMAL_BLOCKED_TILES.has(tile);
        }

        function spW() {
            if (wild.length > 14) return;
            let a = Math.random() * Math.PI * 2,
                d = 200 + Math.random() * 400;
            let wx = G.p.x + Math.cos(a) * d,
                wy = G.p.y + Math.sin(a) * d;
            let tx = Math.floor(wx / T),
                ty = Math.floor(wy / T);
            if (tx < 6 || tx >= MW - 6 || ty < 6 || ty >= MH - 6) return;
            const tile = map[ty]?.[tx];
            if (!tile && tile !== 0) return;
            if (ANIMAL_BLOCKED_TILES.has(tile)) return;
            let ts = [{
                    i: '🦌',
                    s: 1.5,
                    f: 130
                }, {
                    i: '🐇',
                    s: 2,
                    f: 85
                }, {
                    i: '🦊',
                    s: 1.8,
                    f: 100
                }, {
                    i: '🦅',
                    s: .3,
                    f: 0
                },
                {
                    i: '🐿️',
                    s: 2,
                    f: 70
                }, {
                    i: '🦎',
                    s: .4,
                    f: 50
                }, {
                    i: '🐸',
                    s: .7,
                    f: 55
                }, {
                    i: '🦋',
                    s: .2,
                    f: 0
                }, {
                    i: '🐑',
                    s: .8,
                    f: 80
                }
            ];
            // Biome filter
            let filtered = ts.filter(t => {
                if (t.i === '🐸' && tile !== TT.MR && tile !== TT.S) return false;
                if (t.i === '🐑' && tile !== TT.G && tile !== TT.TG && tile !== TT.P) return false;
                if (t.i === '🦎' && tile !== TT.G && tile !== TT.P && tile !== TT.CL) return false;
                return true;
            });
            if (!filtered.length) return;
            const t = filtered[Math.floor(Math.random() * filtered.length)];
            const isFlying = FLYING_ANIMALS.has(t.i);
            const hour = Math.floor(G.ck.t / 60);
            wild.push({
                ...t,
                x: wx,
                y: wy,
                vx: 0,
                vy: 0,
                l: 300 + Math.random() * 500,
                ct: 0,
                wf: 0,
                isMoving: false,
                isFlying,
                state: (hour >= 22 || hour < 5) ? ANIMAL_STATE.SLEEPING : ANIMAL_STATE.IDLE,
                stateTimer: 60 + Math.random() * 120,
                facing: 'right',
                animFrame: 0,
                idleBob: Math.random() * Math.PI * 2
            });
        }

        function uW() {
            const p = G.p,
                hour = Math.floor(G.ck.t / 60);
            for (let i = wild.length - 1; i >= 0; i--) {
                const w = wild[i];
                w.l--;
                w.animFrame++;
                if (w.l <= 0) {
                    wild.splice(i, 1);
                    continue;
                }
                const dx = w.x - p.x,
                    dy = w.y - p.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                w.stateTimer--;
                // Night sleep
                if ((hour >= 22 || hour < 5) && !w.isFlying && w.state !== ANIMAL_STATE.FLEEING) {
                    w.state = ANIMAL_STATE.SLEEPING;
                    w.vx = 0;
                    w.vy = 0;
                    w.isMoving = false;
                    continue;
                }
                // Flee
                if (d < w.f && w.f > 0) {
                    w.state = ANIMAL_STATE.FLEEING;
                    w.stateTimer = 30 + Math.random() * 30;
                    w.vx = (dx / d) * w.s * 2;
                    w.vy = (dy / d) * w.s * 2;
                }
                // State transitions
                if (w.stateTimer <= 0) {
                    const r = Math.random();
                    if (w.state === ANIMAL_STATE.FLEEING) {
                        w.state = ANIMAL_STATE.WALKING;
                        w.stateTimer = 60 + Math.random() * 80;
                    } else if (r < 0.4) {
                        w.state = ANIMAL_STATE.IDLE;
                        w.stateTimer = 80 + Math.random() * 160;
                        w.vx = 0;
                        w.vy = 0;
                    } else if (r < 0.7) {
                        w.state = ANIMAL_STATE.WALKING;
                        w.stateTimer = 60 + Math.random() * 120;
                        const ang = Math.random() * Math.PI * 2;
                        w.vx = Math.cos(ang) * w.s * 0.5;
                        w.vy = Math.sin(ang) * w.s * 0.5;
                    } else {
                        w.state = ANIMAL_STATE.GRAZING;
                        w.stateTimer = 100 + Math.random() * 200;
                        w.vx = 0;
                        w.vy = 0;
                    }
                }
                // Move
                if (w.state === ANIMAL_STATE.IDLE || w.state === ANIMAL_STATE.GRAZING || w.state === ANIMAL_STATE.SLEEPING) {
                    w.isMoving = false;
                    w.wf = Math.max(0, w.wf - 1);
                } else {
                    const nx = w.x + w.vx,
                        ny = w.y + w.vy;
                    if (_animalTileWalkable(nx, ny, w.isFlying)) {
                        w.x = nx;
                        w.y = ny;
                        w.isMoving = true;
                        w.wf++;
                    } else {
                        w.vx = -w.vx + (Math.random() - .5) * w.s;
                        w.vy = -w.vy + (Math.random() - .5) * w.s;
                        w.stateTimer = Math.min(w.stateTimer, 20);
                        const nx2 = w.x + w.vx,
                            ny2 = w.y + w.vy;
                        if (_animalTileWalkable(nx2, ny2, w.isFlying)) {
                            w.x = nx2;
                            w.y = ny2;
                            w.isMoving = true;
                        } else {
                            w.isMoving = false;
                            w.vx = 0;
                            w.vy = 0;
                            w.state = ANIMAL_STATE.IDLE;
                            w.stateTimer = 30;
                        }
                    }
                }
                if (Math.abs(w.vx) > 0.05) w.facing = w.vx > 0 ? 'right' : 'left';
                if (Math.abs(w.x - p.x) > 700 || Math.abs(w.y - p.y) > 700) wild.splice(i, 1);
            }
        }

        function drawAnimal(w, camX, camY) {
            const sx = w.x - camX,
                sy = w.y - camY;
            if (sx < -T || sx > cv.width + T || sy < -T || sy > cv.height + T) return;
            // Shadow
            if (!w.isFlying) {
                c.fillStyle = 'rgba(0,0,0,0.15)';
                c.beginPath();
                c.ellipse(sx, sy + T * 0.3, T * 0.2, T * 0.05, 0, 0, Math.PI * 2);
                c.fill();
            } else {
                c.fillStyle = 'rgba(0,0,0,0.08)';
                c.beginPath();
                c.ellipse(sx + 8, sy + T * 0.6, T * 0.15, T * 0.04, 0, 0, Math.PI * 2);
                c.fill();
            }
            // State
            let yOff = 0,
                scale = 1,
                alpha = 1;
            switch (w.state) {
                case ANIMAL_STATE.IDLE:
                    yOff = Math.sin(w.idleBob + w.animFrame * 0.02) * 1;
                    break;
                case ANIMAL_STATE.GRAZING:
                    yOff = 2 + Math.sin(w.animFrame * 0.05) * 1;
                    break;
                case ANIMAL_STATE.WALKING:
                    yOff = Math.sin(w.animFrame * 0.12) * 2;
                    break;
                case ANIMAL_STATE.FLEEING:
                    yOff = Math.sin(w.animFrame * 0.25) * 3;
                    scale = 1.05;
                    break;
                case ANIMAL_STATE.SLEEPING:
                    yOff = Math.sin(w.animFrame * 0.01) * 0.5;
                    alpha = 0.7;
                    break;
            }
            if (w.isFlying) yOff -= 6 + Math.sin(w.animFrame * 0.08) * 4;
            c.globalAlpha = alpha;
            c.font = (T * 0.55 * scale) + 'px serif';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.save();
            if (w.facing === 'left') {
                c.scale(-1, 1);
                c.fillText(w.i, -sx, sy + yOff);
            } else c.fillText(w.i, sx, sy + yOff);
            c.restore();
            // Sleeping z's
            if (w.state === ANIMAL_STATE.SLEEPING) {
                const zp = (w.animFrame * 0.02) % (Math.PI * 2);
                c.globalAlpha = 0.3 + Math.sin(zp) * 0.3;
                c.font = '8px monospace';
                c.fillStyle = '#aaccff';
                c.fillText('z', sx + 6 + Math.sin(zp) * 3, sy - 8 - Math.abs(Math.sin(zp)) * 6);
                c.font = '6px monospace';
                c.fillText('z', sx + 10 + Math.sin(zp + 1) * 2, sy - 14 - Math.abs(Math.sin(zp + 1)) * 4);
            }
            // Grazing particle
            if (w.state === ANIMAL_STATE.GRAZING && w.animFrame % 40 < 5) {
                c.globalAlpha = 0.5;
                c.font = '6px serif';
                c.fillText('🌱', sx + (Math.random() - .5) * 10, sy + T * 0.2);
            }
            c.globalAlpha = 1;
        }

        const parts = [];

        function uP() {
            if (parts.length < 18 && Math.random() < (G.weather === 'rain' ? .15 : .025)) {
                parts.push({
                    x: G.p.x + (Math.random() - .5) * cv.width,
                    y: G.p.y - cv.height / 2 - 16,
                    vx: (Math.random() - .5) * .4,
                    vy: G.weather === 'rain' ? 3.5 + Math.random() * 2.5 : .25 + Math.random() * .35,
                    sz: G.weather === 'rain' ? 1 : 1 + Math.random() * 2,
                    cl: G.weather === 'rain' ? 'rgba(100,150,255,.3)' : ['#9c8', '#a95', '#8b7'][Math.floor(Math.random() * 3)],
                    l: G.weather === 'rain' ? 45 : 150 + Math.random() * 140,
                    r: Math.random() * Math.PI * 2
                })
            }
            for (let i = parts.length - 1; i >= 0; i--) {
                let p = parts[i];
                p.x += p.vx;
                p.y += p.vy;
                p.l--;
                if (p.l <= 0) parts.splice(i, 1)
            }
        }

        // ══════════════════════════════════════════════════════════════
        // PLAYER SPRITE SYSTEM — 4-directional, walk+idle animation
        // ──────────────────────────────────────────────────────────────
        // SPRITE SHEET FORMAT expected by loadPlayerSprite():
        //   8 rows × max(walkFrames, idleFrames) columns
        //   Each frame: PSPRITE.fw × PSPRITE.fh pixels
        //
        //   Row 0 : idle_down   (idleFrames frames — subtle stand/breathe)
        //   Row 1 : idle_up     (idleFrames frames)
        //   Row 2 : idle_left   (idleFrames frames)
        //   Row 3 : idle_right  (idleFrames frames)
        //   Row 4 : walk_down   (walkFrames frames — L-step, neutral, R-step, neutral)
        //   Row 5 : walk_up     (walkFrames frames)
        //   Row 6 : walk_left   (walkFrames frames)
        //   Row 7 : walk_right  (walkFrames frames)
        //
        // ANCHOR: the sprite is positioned so that (anchorX, anchorY)
        //   inside the frame lands exactly on the player's world position.
        //   anchorX = horizontal centre of the feet
        //   anchorY = pixel row of the feet (from top of frame)
        //
        // USAGE:
        //   const img = new Image();
        //   img.onload = () => { PSPRITE.img = img; PSPRITE.loaded = true; };
        //   img.src = 'petra_sheet.png';   ← call before or after startGame()
        //
        // TWEAKING:
        //   PSPRITE.fw / fh       — frame size on the sheet
        //   PSPRITE.scale         — draw magnification (2 = 2× on screen)
        //   PSPRITE.walkFrames    — frames in each walk row
        //   PSPRITE.idleFrames    — frames in each idle row
        //   PSPRITE.walkFPS       — walk animation speed (frames per second)
        //   PSPRITE.idleFPS       — idle animation speed
        //   PSPRITE.anchorX/Y     — foot anchor inside the frame (pixels)
        // ══════════════════════════════════════════════════════════════
        const PSPRITE = {
            img: null,
            loaded: false,
            fw: 16,
            fh: 24, // source frame size on the sheet
            scale: 2, // draw at 2× → 32×48 on screen
            walkFrames: 4,
            idleFrames: 2,
            walkFPS: 8,
            idleFPS: 2,
            anchorX: 8, // centre of feet horizontally in the frame
            anchorY: 23, // bottom row of feet in the frame
        };

        function loadPlayerSprite(src) {
            const img = new Image();
            img.onload = () => {
                PSPRITE.img = img;
                PSPRITE.loaded = true;
            };
            img.src = src;
        }

        // Returns {row, frame} for the current player state
        function _pSpriteFrame() {
            const p = G.p;
            const dirRow = {
                down: 0,
                up: 1,
                left: 2,
                right: 3
            } [p.fc] ?? 0;
            if (p.w) {
                const frame = Math.floor(p.ft / (60 / PSPRITE.walkFPS)) % PSPRITE.walkFrames;
                return {
                    row: 4 + dirRow,
                    frame
                };
            } else {
                const frame = Math.floor(Date.now() / (1000 / PSPRITE.idleFPS)) % PSPRITE.idleFrames;
                return {
                    row: dirRow,
                    frame
                };
            }
        }

        // ── Pixel-art fallback: proper 4-directional with walk cycle ──
        function _drawPFallback(sx, sy) {
            const p = G.p,
                fc = p.fc;
            // Animation values
            const t = p.ft * .18;
            const lo = p.w ? Math.sin(t) * 3 : 0; // leg oscillation amplitude
            const bo = p.w ? Math.sin(t) * 1.0 : 0; // body bob
            const ar = p.w ? Math.sin(t) * 2.5 : 0; // arm swing

            // Shared colours
            const SKIN = '#f5d0a0',
                HAIR = '#3a2a1a',
                SHIRT = '#e0d8c8',
                PANT = '#4a6080',
                BOOT = '#5a3a20',
                NOSE = '#d0a080';

            if (fc === 'down') {
                // — Back arms —
                c.fillStyle = SHIRT;

        // ══════════════════════════════════════════════════════════════
        // SIMPLE NEIGHBOR AUTOTILE — water corners using your GIF sprites
        // ══════════════════════════════════════════════════════════════
        // For each water tile we check its 4 cardinal neighbors.
        // Based on which neighbors are also water we pick one of 8 sprites:
        //
        //   water2   = surrounded / open water (your animated GIF)
        //   corner2  = water to the right and below  (top-left land corner)
        //   corner3  = water to the left and below   (top-right land corner)
        //   corner4  = water to the right and above  (bottom-left land corner)
        //   corner5  = water to the left and above   (bottom-right land corner)
        //   corner6  = water right only  (left edge)
        //   corner7  = water below only  (top edge)
        //   corner8  = isolated / rare case fallback
        //
        // All images are loaded once at startup. They render at full T×T size.
        // ══════════════════════════════════════════════════════════════

        // Load the water tile sprites
        const WATER_SPRS = {};
        (function() {
            const urls = {
               
            };
            for (const [k, url] of Object.entries(urls)) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = url;
                WATER_SPRS[k] = img;
            }
        })();

        // Returns true if tile at (tx,ty) is a water-group tile
        function _isWater(tx, ty) {
            const t = map[ty]?.[tx];
            return t === TT.W || t === TT.DW || t === TT.S;
        }

        // Pick the right sprite key for a water tile based on its neighbors
        function _waterSprKey(tx, ty) {
            const N = _isWater(tx, ty - 1); // north neighbor is water
            const S = _isWater(tx, ty + 1); // south
            const W2 = _isWater(tx - 1, ty); // west
            const E = _isWater(tx + 1, ty); // east
            const mask = (N ? 8 : 0) | (E ? 4 : 0) | (S ? 2 : 0) | (W2 ? 1 : 0);
            // All 16 cases mapped to your 8 sprites:
            // w2  = open water (3+ water neighbors)
            // corners = exactly the matching geometry
            switch (mask) {
                case 15:
                    return 'w2'; // all 4 neighbors water = open
                case 14:
                    return 'wc2'; // N+E+S, no W  → left-edge
                case 13:
                    return 'wc3'; // N+E+W, no S  → bottom-edge
                case 11:
                    return 'wc4'; // N+S+W, no E  → right-edge
                case 7:
                    return 'wc5'; // E+S+W, no N  → top-edge
                case 12:
                    return 'wc6'; // N+E only
                case 6:
                    return 'wc7'; // E+S only
                case 3:
                    return 'wc8'; // S+W only
                case 9:
                    return 'wc2'; // N+W only → reuse corner2
                case 5:
                    return 'wc6'; // N+S only (vertical strip)
                case 10:
                    return 'wc7'; // E+W only (horizontal strip)
                case 4:
                    return 'wc2'; // E only
                case 8:
                    return 'wc3'; // N only
                case 2:
                    return 'wc5'; // S only
                case 1:
                    return 'wc4'; // W only
                default:
                    return 'w2'; // isolated tile
            }
        }

        // Draw one water tile with the correct neighbor-aware sprite
        function drawWaterAutotile(tx, ty, sx, sy) {
            const key = _waterSprKey(tx, ty);
            const img = WATER_SPRS[key];
            if (img && img.complete && img.naturalWidth > 0) {
                c.imageSmoothingEnabled = false;
                c.drawImage(img, sx, sy, T, T);
            }
            // If not loaded yet the base dT water tile already drew underneath — no gap
        }

        // Called from render() after all base tiles, replaces water tile visuals
        function renderAutotiles(tx0, ty0, tx1, ty1, camX, camY) {
            for (let ty = ty0; ty <= ty1; ty++) {
                for (let tx = tx0; tx <= tx1; tx++) {
                    const t = map[ty]?.[tx];
                    if (t === TT.W || t === TT.DW) {
                        drawWaterAutotile(tx, ty, tx * T - camX, ty * T - camY);
                    }
                }
            }
        }

        function dMM() {
            if (CABIN_ACTIVE) return;
            mc.fillStyle = '#12101a';
            mc.fillRect(0, 0, 100, 100);
            let sc = 100 / (MW * T);
            for (let y = 0; y < MH; y += 3)
                for (let x = 0; x < MW; x += 3) {
                    let t = map[y]?.[x];
                    if (t === undefined) continue;
                    let cl = '#283828';
                    if (t === TT.W || t === TT.DW) cl = '#3a6fb0';
                    else if (t === TT.P) cl = '#a0906a';
                    else if (t === TT.TR || t === TT.DT || t === TT.BU) cl = '#2d5b2e';
                    else if (t === TT.R || t === TT.CL || t === TT.BO) cl = '#505050';
                    else if (t === TT.H || t === TT.SH || t === TT.CH) cl = '#a07050';
                    else if (t === TT.CB) cl = '#c08040';
                    else if (t === TT.D) cl = '#6a5a4a';
                    mc.fillStyle = cl;
                    mc.fillRect(x * sc * T, y * sc * T, 3 * sc * T + 1, 3 * sc * T + 1)
                }
            SITES.forEach(s => {
                if (!s.vis) return;
                mc.fillStyle = s.ex ? '#60a848' : '#c070a0';
                mc.beginPath();
                mc.arc(s.x * sc, s.y * sc, 2, 0, Math.PI * 2);

                mc.fillStyle = '#ffd700';
                mc.beginPath();
                mc.arc(n.x * sc, n.y * sc, 1.5, 0, Math.PI * 2);
                mc.fill()
            });
            mc.fillStyle = '#ff8800';
            mc.beginPath();
            mc.arc(90 * T * sc + 16 * sc, 95 * T * sc, 2, 0, Math.PI * 2);
            mc.fill();
            mc.fillStyle = '#fff';
            mc.beginPath();
            mc.arc(G.p.x * sc, G.p.y * sc, 2.5, 0, Math.PI * 2);

        }

                let hh = Math.floor(G.ck.t / 60),
                    da2 = 0;
                if (hh >= 20 || hh < 5) da2 = hh >= 20 ? (hh - 20) / 4 * .38 : Math.min(.38, (5 - hh) / 5 * .38);
                else if (hh < 7) da2 = Math.max(0, (7 - hh) / 7 * .12);
                if (da2 > 0) {
                    c.fillStyle = `rgba(8,8,28,${da2})`;
                    c.fillRect(0, 0, cv.width, cv.height);
                }
                return;
            }

            let sx0 = Math.max(0, Math.floor(cx / T) - 1),
                sy0 = Math.max(0, Math.floor(cy / T) - 1);
            let sx1 = Math.min(MW - 1, Math.ceil((cx + cv.width) / T) + 1),
                sy1 = Math.min(MH - 1, Math.ceil((cy + cv.height) / T) + 1);
            resetTreeOverlays();
            for (let y = sy0; y <= sy1; y++)
                for (let x = sx0; x <= sx1; x++) {
                    let t = map[y]?.[x];
                    if (t !== undefined) dT(x, y, t, x * T - cx, y * T - cy)
                }
            renderAutotiles(sx0, sy0, sx1, sy1, cx, cy);

            wild.forEach(w => drawAnimal(w, cx, cy));

            SITES.forEach(s => {
                if (!s.vis) return;
                if (s.req.length && !s.req.every(r => G.clues.includes(r))) return;
                let sx = s.x - cx,
                    sy = s.y - cy;
                if (sx < -28 || sx > cv.width + 28 || sy < -28 || sy > cv.height + 28) return;
                let gs = 15 + Math.sin(Date.now() / 500) * 3;
                let gr = c.createRadialGradient(sx, sy, 0, sx, sy, gs);
                if (s.ex && !s.th) {
                    gr.addColorStop(0, 'rgba(96,168,72,.2)');
                    gr.addColorStop(1, 'rgba(96,168,72,0)')
                } else if (s.ex) {
                    gr.addColorStop(0, 'rgba(255,165,0,.2)');
                    gr.addColorStop(1, 'rgba(255,165,0,0)')
                } else {
                    gr.addColorStop(0, 'rgba(192,112,160,.2)');
                    gr.addColorStop(1, 'rgba(192,112,160,0)')
                }
                c.fillStyle = gr;
                c.beginPath();
                c.arc(sx, sy, gs, 0, Math.PI * 2);
                c.fill();
                c.font = '16px serif';
                c.textAlign = 'center';
                c.fillText(s.i, sx, sy + 4);
                c.font = '9px VT323,monospace';
                c.fillStyle = '#deeed6';
                c.fillText(s.lb, sx, sy - 12);
                c.textAlign = 'left'
            });

            // Cabin glow
            let cbx = 90 * T + 16 - cx,
                cby = 95 * T - cy;
            if (cbx > -30 && cbx < cv.width + 30 && cby > -30 && cby < cv.height + 30) {
                c.font = '10px serif';
                c.textAlign = 'center';
                c.fillText('🏠', cbx, cby - 16);
                c.textAlign = 'left'
            }

            NPC.forEach(n => drawNpcEnhanced(n, cx, cy));
            drawBuildingPrompts(cx, cy);

            drawP();
            drawTreeOverlays();

            parts.forEach(p => {
                let sx = p.x - cx,
                    sy = p.y - cy;
                if (sx < -4 || sx > cv.width + 4 || sy < -4 || sy > cv.height + 4) return;
                c.save();
                c.translate(sx, sy);
                c.fillStyle = p.cl;
                c.globalAlpha = Math.min(1, p.l / 25);
                if (G.weather === 'rain') c.fillRect(0, 0, 1, p.sz * 3);
                else {
                    c.rotate(p.r);
                    c.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz * .5)
                }
                c.restore();
                c.globalAlpha = 1
            });

            let h = Math.floor(G.ck.t / 60),
                da = 0;
            if (h >= 20 || h < 5) da = h >= 20 ? (h - 20) / 4 * .38 : Math.min(.38, (5 - h) / 5 * .38);
            else if (h < 7) da = Math.max(0, (7 - h) / 7 * .12);
            if (da > 0) {
                c.fillStyle = `rgba(8,8,28,${da})`;
                c.fillRect(0, 0, cv.width, cv.height)
            }
            if (G.weather === 'fog') {
                c.fillStyle = 'rgba(170,170,180,.18)';
                c.fillRect(0, 0, cv.width, cv.height)
            }
            dMM()
        }

        function loop() {
            update();
            render();
            requestAnimationFrame(loop)
        }

        // Trees as depth objects: trunk is at tile bottom, canopy overhangs upward.
        // We render trees in TWO passes:
        //   Pass 1 (base): draw trunk/roots at tile position  — happens in dT normally
        //   Pass 2 (overlay): draw canopy AFTER player if player y < tree centre y
        // This list collects tree screen positions during tile rendering for overlay pass.
        // Tree display sizes (all same width=110px, heights scaled proportionally)
        const TREE_SIZES = {
            tree: {
                w: 94,
                h: 110
            }, // TREE-1: 110×94
            tree2: {
                w: 110,
                h: Math.round(110 * 195 / 128)
            }, // tree2 128×195 → 110×167
            pine_tree: {
                w: 110,
                h: Math.round(110 * 229 / 114)
            }, // pine 114×229 → 110×221
        };

        let _treeOverlays = [];

        function resetTreeOverlays() {
            _treeOverlays = [];
        }

        // tx,ty = world tile coords for deterministic sprite choice
        function pushTreeOverlay(sx, sy, tx, ty, tileType) {
            // Pick sprite based on tile type + deterministic hash
            const r = tileRand(tx, ty, 99);
            let spr;
            if (tileType === TT.DT) {
                // Dense/dark forest: mostly pine, some standard trees
                spr = r < 0.55 ? 'pine_tree' : r < 0.80 ? 'tree' : 'tree2';
            } else {
                // Normal TR: mostly deciduous, pine very rare
                spr = r < 0.55 ? 'tree' : r < 0.80 ? 'tree2' : 'pine_tree';
            }
            _treeOverlays.push({
                sx,
                sy,
                spr
            });
        }

        function drawTreeOverlays() {
            for (const {
                    sx,
                    sy,
                    spr
                }
                of _treeOverlays) {
                const img = SPR[spr];
                const sz = TREE_SIZES[spr] || TREE_SIZES.tree;
                // Anchor at base-centre of the tile bottom edge
                const dx = sx + T / 2 - sz.w / 2;
                const dy = sy + T - sz.h; // top of image lands so bottom edge = tile bottom
                if (img && img.complete && img.naturalWidth > 0) {
                    c.imageSmoothingEnabled = true;
                    c.drawImage(img, dx, dy, sz.w, sz.h);
                } else {
                    // Fallback procedural canopy
                    c.fillStyle = spr === 'pine_tree' ? '#1d4a1e' : '#2d6b2e';
                    c.beginPath();
                    c.arc(sx + T / 2, sy + T * 0.3, T * 0.55, 0, Math.PI * 2);
                    c.fill();
                }
            }
        }
        // ══════════════════════════════════════════════════════════════
        const SPR = {};

        function loadSpr(id, url) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                SPR[id] = img;
            };
            img.src = url;
            return img;
        }

        // ── Load your sprites ──────────────────────────────────────────
        loadSpr('tree', 'https://i.postimg.cc/635jCgK4/TREE-1.png');
        loadSpr('tree2', 'https://i.postimg.cc/X70sTBY1/image.png');
        loadSpr('pine_tree', 'https://i.postimg.cc/ZRzqmxYp/image.png');
        loadSpr('grass', 'https://i.postimg.cc/FFWjSqCZ/image.png');
        loadSpr('grass_var', 'https://i.postimg.cc/XqXvfs1q/image.png');
        loadSpr('reed', 'https://i.postimg.cc/Z538X7sR/image.png');
        loadSpr('iris', 'https://i.postimg.cc/kXVJZ9sd/image.png');
        loadSpr('iris2', 'https://i.postimg.cc/brK7kd6h/image.png');
        loadSpr('lilypad1', 'https://i.postimg.cc/yYCF4qtS/image.png');
        loadSpr('lilypad2', 'https://i.postimg.cc/nLJ5CwX1/image.png');
        loadSpr('lilypad3', 'https://i.postimg.cc/B6ZVCLc3/image.png');
        loadSpr('lilypad4', 'https://i.postimg.cc/jSvjxFxf/image.png');
        loadSpr('poppy', 'https://i.postimg.cc/bvLgH10n/image.png');
        loadSpr('foxglove', 'https://i.postimg.cc/HWbpTC55/image.png');
        loadSpr('tallgrass', 'https://i.postimg.cc/hj6bsdMs/image.png');
        loadSpr('mud', 'https://i.postimg.cc/rsG8v00c/image.png');
        loadSpr('rocks', 'https://i.postimg.cc/tgKkT0xs/image-(17).png');

          function sprVariant(id, tileKey, weight, widthPx = null, heightPx = null) {
            if (!TILE_VARIANTS[tileKey]) TILE_VARIANTS[tileKey] = [];

            TILE_VARIANTS[tileKey].push({
                weight,
                draw(ctx, sx, sy, TS) {
                    const img = SPR[id];
                    if (!img || !img.complete || !img.naturalWidth) return;

                    ctx.imageSmoothingEnabled = false;

                    // Se não passar tamanhos, usa o tamanho padrão do tile (TS)
                    const w = (widthPx !== null) ? widthPx : TS;
                    const h = (heightPx !== null) ? heightPx : TS;

                    // Centraliza na largura do tile e ancora a base no fundo do tile
                    const finalX = sx - (w - TS) / 2;
                    const finalY = sy - (h - TS);

                    ctx.drawImage(img, finalX, finalY, w, h);
                }
            });
        }



        // Register sprite-based variants (called after TILE_VARIANTS is initialised)
        function registerSpriteVariants() {
            // Grass base tile — replace procedural base when sprite loaded
            // We don't replace base tile (that's dT), we add as high-weight overlay
            sprVariant('grass', TT.G, 0.55); // grass texture overlaid
            sprVariant('grass_var', TT.G, 0.02, 16, 16); // grass variation
            sprVariant('tallgrass', TT.TG, 0.06, 22, 61); // tall grass texture
            sprVariant('mud', TT.MU, 0.80); // mud tile
            sprVariant('rocks', TT.BO, 0.60, 16, 16); // boulder/rocks
            sprVariant('rocks', TT.R, 0.50, 16, 16); // rock tile
            // Tall grass reed variant on mud/marsh
            sprVariant('reed', TT.MR, 0.01);
            sprVariant('reed', TT.MU, 0.02);
            // Iris — appears on wetland/water edge tiles
            sprVariant('iris', TT.MR, 0.01);
            sprVariant('iris2', TT.MR, 0.01);
            // Lily pads on water — varied
            sprVariant('lilypad1', TT.W, 0.015, 24, 24);
            sprVariant('lilypad2', TT.W, 0.01, 22, 22);
            sprVariant('lilypad3', TT.W, 0.04, 16, 16);
            sprVariant('lilypad4', TT.W, 0.05, 24, 20);
            // Flowers on grass
            sprVariant('poppy', TT.G, 0.02, 16, 14);
            sprVariant('poppy', TT.FL2, 0.02, 16, 14);
            sprVariant('foxglove', TT.TG, 0.06);
            sprVariant('foxglove', TT.G, 0.03);
            // Trees are handled by the overlay system (drawTreeOverlays), not tile variants
            // sprVariant('tree', ...) intentionally not here
        }

        // ══════════════════════════════════════════════════════════════
        // FISHING MINIGAME
        // ── How it works ──────────────────────────────────────────────
        // Press E near water → opens the fishing overlay.
        // A fish silhouette drifts left-right in a "river" lane.
        // A catch-zone bar bounces up-down on the right side.
        // Player clicks/presses SPACE when the fish icon overlaps the
        // catch zone.  Timing determines catch quality.
        // ── Difficulty ────────────────────────────────────────────────
        // fishingLevel 0→2 increases fish speed & shrinks catch zone.
        // Catching fish raises fishingLevel (max 2).
        // ── Rewards ───────────────────────────────────────────────────
        // Perfect catch → 2× fish + XP
        // Good catch    → 1× fish
        // Miss          → energy cost, try again prompt
        // ══════════════════════════════════════════════════════════════
        let _fishGame = null; // null = not active

        function openFishing() {
            // Build overlay HTML
            const ov = document.getElementById('iO');
            document.getElementById('iP').innerHTML = `
  <button class="cb" onclick="closeFishing()">✕</button>
  <div class="pt">🎣 FISHING</div>
  <div id="fishWrap" style="position:relative;width:100%;height:220px;background:#1a2d3a;border:2px solid #3a5a6a;border-radius:4px;overflow:hidden;margin-bottom:8px;">
    <canvas id="fishCv" width="480" height="220" style="width:100%;height:220px;image-rendering:pixelated;display:block;"></canvas>
  </div>
  <div id="fishMsg" style="text-align:center;font-size:18px;color:#a0d0e0;min-height:24px;margin-bottom:6px;">Cast your line… press SPACE or click when the fish hits the zone!</div>
  <div style="text-align:center;gap:8px;display:flex;justify-content:center">
    <button class="ab" onclick="fishCast()" id="fishBtn">🎣 Cast / Catch!</button>
    <button class="ab" onclick="closeFishing()">Leave</button>
  </div>`;
            ov.classList.add('o');
            _startFishGame();
        }

        function closeFishing() {
            if (_fishGame) {
                cancelAnimationFrame(_fishGame.raf);
                _fishGame = null;
            }
            document.getElementById('iO').classList.remove('o');
            G.da = false;
        }

        function _startFishGame() {
            const cv2 = document.getElementById('fishCv');
            if (!cv2) return;
            const ctx = cv2.getContext('2d');
            const W = 480,
                H = 220;
            const lvl = G.fishLv || 0;
            const fishSpd = 1.2 + lvl * 0.5;
            const zoneH = 60 - lvl * 12; // catch-zone height in pixels
            const zoneSpd = 1.0 + lvl * 0.4;

            let fx = 60,
                fy = H / 2,
                fvx = fishSpd; // fish position & velocity
            let zoneY = H / 2 - zoneH / 2,
                zoneVy = zoneSpd; // catch-zone
            let hooked = false,
                hookTimer = 0;
            let casting = false,
                castX = W / 2,
                castY = 20,
                lineLen = 0;

            _fishGame = {
                raf: null,
                state: 'waiting'
            }; // 'waiting','casting','hooked','result'

            const fishEmojis = ['🐟', '🐠', '🐡'];
            const fe = fishEmojis[Math.floor(Math.random() * fishEmojis.length)];

            function drawFrame() {
                ctx.clearRect(0, 0, W, H);

                // Water background with animated ripples
                const t2 = Date.now();
                for (let y = 0; y < H; y++) {
                    const wave = Math.sin(y * 0.08 + t2 * 0.002) * 3;
                    ctx.fillStyle = `hsl(210,60%,${18+Math.sin(y*0.04+t2*0.001)*4}%)`;
                    ctx.fillRect(0, y, W, 1);
                }
                // Surface line
                ctx.fillStyle = 'rgba(100,200,255,0.15)';
                ctx.fillRect(0, 0, W, 18);
                ctx.fillStyle = 'rgba(100,200,255,0.08)';
                for (let rx = 0; rx < W; rx += 40) {
                    const rw = 20 + Math.sin(rx + t2 * 0.003) * 10;
                    ctx.beginPath();
                    ctx.ellipse(rx + (t2 * 0.02 % 40), 9, rw, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Catch zone (right side)
                const zx = W - 60;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(zx, 0, 50, H);
                ctx.fillStyle = 'rgba(60,200,100,0.35)';
                ctx.fillRect(zx + 4, zoneY, 42, zoneH);
                ctx.strokeStyle = '#60c864';
                ctx.lineWidth = 2;
                ctx.strokeRect(zx + 4, zoneY, 42, zoneH);
                ctx.fillStyle = '#60c864';
                ctx.font = '9px VT323,monospace';
                ctx.textAlign = 'center';
                ctx.fillText('ZONE', zx + 25, zoneY + zoneH / 2 + 4);
                ctx.textAlign = 'left';

                // Fishing line & rod
                const rodX = W - 35,
                    rodY = 8;
                ctx.strokeStyle = 'rgba(200,180,120,0.7)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(rodX, rodY);
                ctx.lineTo(fx + 8, fy);
                ctx.stroke();
                // Hook
                ctx.fillStyle = '#c0c0c0';
                ctx.beginPath();
                ctx.arc(fx + 8, fy, 2, 0, Math.PI * 2);
                ctx.fill();

                // Fish
                ctx.font = '22px serif';
                ctx.textAlign = 'center';
                ctx.fillText(fe, fx, fy + 8);
                ctx.textAlign = 'left';

                // Catch flash
                if (_fishGame.state === 'result') {
                    ctx.fillStyle = _fishGame.success ? 'rgba(100,255,100,0.25)' : 'rgba(255,80,80,0.2)';
                    ctx.fillRect(0, 0, W, H);
                }

                // Update fish
                fx += fvx;
                if (fx > W - 80 || fx < 20) {
                    fvx *= -1;
                    fy = 30 + Math.random() * (H - 60);
                }
                // Small vertical drift
                fy += Math.sin(t2 * 0.004 + fx) * 0.3;
                fy = Math.max(20, Math.min(H - 20, fy));

                // Update zone
                zoneY += zoneVy;
                if (zoneY <= 0 || zoneY + zoneH >= H) zoneVy *= -1;

                if (_fishGame.state !== 'result') _fishGame.raf = requestAnimationFrame(drawFrame);
            }
            _fishGame.raf = requestAnimationFrame(drawFrame);

            // Store refs for catch check
            _fishGame.getFishY = () => fy;
            _fishGame.getZoneY = () => zoneY;
            _fishGame.getZoneH = () => zoneH;
            _fishGame.zx = W - 60;
            _fishGame.fishX = () => fx;
        }

        function fishCast() {
            if (!_fishGame) return;
            const fy = _fishGame.getFishY();
            const zy = _fishGame.getZoneY();
            const zh = _fishGame.getZoneH();
            const fx = _fishGame.fishX();
            const zx = _fishGame.zx;

            // Check if fish is in catch zone (fish must be in zone X range AND zone Y range)
            const fishInZoneY = fy >= zy && fy <= zy + zh;
            const fishInZoneX = fx >= zx - 10 && fx <= zx + 50;

            cancelAnimationFrame(_fishGame.raf);
            _fishGame.state = 'result';

            const msg = document.getElementById('fishMsg');
            if (fishInZoneY && fishInZoneX) {
                // Perfect catch
                aM('fish_r', 2);
                G.fishLv = Math.min(2, (G.fishLv || 0) + 1);
                _fishGame.success = true;
                msg.textContent = '🎉 PERFECT! Two fish caught!';
                msg.style.color = '#60e860';
                aJ('🎣 Perfect catch! ×2 fish.');
                no('🐟 Perfect catch! +2 raw fish');
                setTimeout(() => {
                    _startFishGame();
                }, 1200);
            } else if (fishInZoneY || fishInZoneX) {
                // Good catch
                aM('fish_r', 1);
                _fishGame.success = true;
                msg.textContent = '✅ Good catch! One fish.';
                msg.style.color = '#a0e8a0';
                aJ('🎣 Caught a fish.');
                no('🐟 Caught a fish!');
                setTimeout(() => {
                    _startFishGame();
                }, 1200);
            } else {
                // Miss
                _fishGame.success = false;
                G.p.en = Math.max(0, G.p.en - 3);
                msg.textContent = '❌ Missed! Cast again.';
                msg.style.color = '#e88080';
                setTimeout(() => {
                    _startFishGame();
                }, 800);
            }
        }

        // Wire fishing to water interaction and João
        function tryFishing() {
            let px = G.p.x,
                py = G.p.y;
            let nearWater = false;
            for (let dy = -2; dy <= 2; dy++)
                for (let dx = -2; dx <= 2; dx++) {
                    const tx = Math.floor(px / T) + dx,
                        ty = Math.floor(py / T) + dy;
                    if (map[ty]?.[tx] === TT.W || map[ty]?.[tx] === TT.S) nearWater = true;
                }
            if (!nearWater) {
                no('No fishing spot nearby. Find water.');
                return;
            }
            G.da = true;
            openFishing();
        }

        // Add F key for fishing
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'f' && G.st && !uO()) tryFishing();
            if ((e.key === ' ' || e.key === 'Enter') && _fishGame && document.getElementById('iO').classList.contains('o')) fishCast();
        });

        function startGame() {
            initPortraitUI();
            registerSpriteVariants();
            if (!G.coins) G.coins = 50; // start with 50 coins
            document.getElementById('title').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('toolbar').style.display = 'flex';
            ['bpB', 'crB', 'quB'].forEach(id => {
                document.getElementById(id).style.display = 'flex'
            });
            document.getElementById('mm').style.display = 'block';
            G.st = true;
            genWorld();
            G.p.x = 90 * T + 16;
            G.p.y = 97 * T;
            G.cam.x = G.p.x - cv.width / 2;
            G.cam.y = G.p.y - cv.height / 2;
            G.wt = 0;
            aJ('Arrived at Eldergrove. Cabin assigned.');
            setTimeout(() => {
                sDlg([{
                        s: 'Dr. Petra',
                        t: 'Eldergrove Forest Park. My cabin is right here.'
                    },
                    {
                        s: 'Dr. Petra',
                        t: 'I need food, water, and rest. I\'m not made of stone.'
                    },
                    {
                        s: 'Dr. Petra',
                        t: 'Ranger Tom is at the station north. The village is far southwest — lots of people to talk to.'
                    },
                    {
                        s: 'Dr. Petra',
                        t: 'WASD move. E interact/gather. 1-6 tools. B backpack. C craft. J quests. N plants. F fish.'
                    },
                    {
                        s: 'Dr. Petra',
                        t: 'I should explore, gather materials, talk to everyone, and investigate the marked sites.'
                    }
                ])
            }, 300)
        }

        loop();
    </script>
